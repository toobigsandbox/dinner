<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Label & Lingo Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans', sans-serif; }
        .card-break { page-break-after: always; break-inside: avoid; }
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; padding: 0 !important; }
            .grid { display: block !important; }
            .card-break { 
                height: 9.5in !important; 
                width: 7.5in !important; 
                margin: 0 auto 1in auto !important; 
                border: 2px solid #e2e8f0 !important;
            }
        }
    </style>
</head>
<body class="bg-slate-900 min-h-screen p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        
        <header class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-12 gap-6 no-print">
            <div>
                <h1 class="text-4xl font-black text-white flex items-center gap-3 italic tracking-tighter uppercase">
                    <i data-lucide="volume-2" class="text-blue-400"></i> Master Label & Lingo Library
                </h1>
                <p class="text-slate-400 text-lg">Visual anchors for safety, communication, zones, and advocacy.</p>
            </div>
            
            <div class="flex flex-wrap gap-2 bg-slate-800 p-2 rounded-3xl border border-slate-700">
                <button onclick="setFilter('ALL')" id="filter-ALL" class="px-5 py-2 rounded-2xl font-bold transition-all bg-blue-600 text-white">All</button>
                <button onclick="setFilter('SAFETY')" id="filter-SAFETY" class="px-5 py-2 rounded-2xl font-bold transition-all text-slate-400">Safety</button>
                <button onclick="setFilter('LINGO')" id="filter-LINGO" class="px-5 py-2 rounded-2xl font-bold transition-all text-slate-400">Lingo</button>
                <button onclick="setFilter('ZONE')" id="filter-ZONE" class="px-5 py-2 rounded-2xl font-bold transition-all text-slate-400">Zones</button>
                <button onclick="setFilter('STEPS')" id="filter-STEPS" class="px-5 py-2 rounded-2xl font-bold transition-all text-slate-400">Steps</button>
                <button onclick="setFilter('ADVOCACY')" id="filter-ADVOCACY" class="px-5 py-2 rounded-2xl font-bold transition-all text-slate-400">Advocacy</button>
            </div>
        </header>

        <div id="lingo-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 lg:gap-12">
            <!-- Cards injected via JS -->
        </div>

        <div class="mt-20 text-center text-slate-500 no-print pb-20">
            <p class="text-xl font-bold text-slate-400 mb-2">Printing Guidance</p>
            <p class="max-w-2xl mx-auto italic">Print in color, laminate, and apply magnetic tape. Use these to turn the kitchen into a fully visual environment for the April 16th Flagship Dinner.</p>
            <button onclick="window.print()" class="mt-8 bg-white text-slate-900 px-10 py-4 rounded-2xl font-black uppercase tracking-widest hover:bg-blue-600 hover:text-white transition-all shadow-xl">
                Print Selected Labels
            </button>
        </div>
    </div>

    <script>
        const masterData = [
            // SAFETY CATEGORY
            { cat: "SAFETY", title: "HOT!", phon: "H-ot", mean: "Hot surface or steam. This will burn you.", icon: "flame", color: "bg-red-600", border: "border-red-700", resp: "Checking Hot!", ex: "Stove, Oven, Heat Lamps, Warm Plates." },
            { cat: "SAFETY", title: "SHARP!", phon: "Sh-arp", mean: "This item can cut. Use the claw grip.", icon: "alert-triangle", color: "bg-red-600", border: "border-red-700", resp: "Sharp, Heard!", ex: "Knives, Graters, Pealers, Mandolins." },
            { cat: "SAFETY", title: "BEHIND!", phon: "Bee-hind", mean: "I am walking behind you. Do not move back!", icon: "navigation", color: "bg-orange-500", border: "border-orange-600", resp: "Heard!", ex: "Use when someone is at a prep table or at the stove." },
            { cat: "SAFETY", title: "CORNER!", phon: "Kor-ner", mean: "I am turning a corner and cannot see you.", icon: "rotate-cw", color: "bg-orange-500", border: "border-orange-600", resp: "Heard!", ex: "Shout this before passing through any swing doors." },
            { cat: "SAFETY", title: "COMING THROUGH!", phon: "Kum-ing Thru", mean: "I have full hands and I am moving through.", icon: "move", color: "bg-orange-500", border: "border-orange-600", resp: "Heard, clear path!", ex: "When carrying a heavy tray or full bus tub." },
            
            // LINGO CATEGORY
            { cat: "LINGO", title: "HANDS!", phon: "Hands", mean: "Food is ready! I need someone to carry this.", icon: "hand", color: "bg-yellow-400 text-black", border: "border-yellow-500", resp: "Hands coming!", ex: "Chef yells this at the plating/staging window." },
            { cat: "LINGO", title: "HEARD!", phon: "Herd", mean: "I understand and I will do the task.", icon: "check-circle-2", color: "bg-emerald-500", border: "border-emerald-600", resp: "Thank you!", ex: "Every instruction should be answered with Heard!" },
            { cat: "LINGO", title: "YES, CHEF!", phon: "Yes, Chef", mean: "One clear response to show I registered the task.", icon: "heart", color: "bg-emerald-500", border: "border-emerald-600", resp: "Let's work!", ex: "Acknowledge a direction without needing an explanation." },
            { cat: "LINGO", title: "IN THE WEEDS", phon: "In the weeds", mean: "I am overwhelmed and I need help now.", icon: "help-circle", color: "bg-purple-600", border: "border-purple-700", resp: "How can I help?", ex: "Use this dignified code when you are behind on a task." },
            { cat: "LINGO", title: "86", phon: "Eighty-Six", mean: "We are out of this item. Stop selling it!", icon: "trash-2", color: "bg-slate-700", border: "border-slate-800", resp: "86 [Item], Heard!", ex: "86 Strawberries! We used the last box." },
            { cat: "LINGO", title: "PICK UP", phon: "Pick Up", mean: "A dish is ready to be moved to the guest.", icon: "utensils", color: "bg-blue-600", border: "border-blue-700", resp: "Picking up!", ex: "The salad is ready to leave the kitchen." },
            { cat: "LINGO", title: "CLEAN AS YOU GO", phon: "Clean...", mean: "Wipe your station between tasks.", icon: "sparkles", color: "bg-sky-500", border: "border-sky-600", resp: "Wiping now!", ex: "Don't wait for the end to clean the table." },
            
            // ZONE CATEGORY
            { cat: "ZONE", title: "ON STAGE", phon: "On Stage", mean: "The Dining Room. Professional voices and smiles.", icon: "users", color: "bg-indigo-600", border: "border-indigo-700", resp: "On Stage!", ex: "Where we serve and greet our 45 guests." },
            { cat: "ZONE", title: "BACKSTAGE", phon: "Backstage", mean: "The Kitchen. Hard work and team focus.", icon: "chef-hat", color: "bg-slate-600", border: "border-slate-700", resp: "Backstage!", ex: "Where we prep, cook, and clean together." },
            { cat: "ZONE", title: "EARTH GIFTS", phon: "Earth Gifts", mean: "Produce station. Washing and prep for plants.", icon: "leaf", color: "bg-emerald-600", border: "border-emerald-700", resp: "Handling Gifts!", ex: "Used for cucumbers, herbs, apples, and beets." },
            { cat: "ZONE", title: "THE HUDDLE", phon: "Hud-dle", mean: "Our meeting spot for check-ins.", icon: "info", color: "bg-blue-500", border: "border-blue-600", resp: "Huddling!", ex: "The whiteboard where we check the visual agenda." },
            { cat: "ZONE", title: "STAGING", phon: "Stay-jing", mean: "Where finished plates wait for service.", icon: "layout", color: "bg-pink-600", border: "border-pink-700", resp: "Staging ready!", ex: "The window between the kitchen and guest room." },
            { cat: "ZONE", title: "THE FRAME", phon: "The Frame", mean: "The perfect setup for a guest's place.", icon: "square", color: "bg-sky-600", border: "border-sky-700", resp: "Frame Set!", ex: "Setting the table correctly for our guests." },
            { cat: "ZONE", title: "CLEAN SIDE", phon: "Clean", mean: "Where finished, clean prep goes.", icon: "check", color: "bg-emerald-500", border: "border-emerald-600", resp: "Placing on clean!", ex: "Keep finished ingredients here." },
            { cat: "ZONE", title: "DIRTY SIDE", phon: "Dirty", mean: "Where unwashed produce or dishes go.", icon: "x", color: "bg-amber-700", border: "border-amber-800", resp: "Clearing to dirty!", ex: "Do not mix dirty with the clean prep." },
            
            // STEPS/PEDAGOGY CATEGORY
            { cat: "STEPS", title: "WATCH", phon: "W-otch", mean: "Eyes on the Chef. Observe how it's done.", icon: "eye", color: "bg-blue-400", border: "border-blue-500", resp: "Watching!", ex: "Step 1: Learning the technique." },
            { cat: "STEPS", title: "TRY", phon: "Tr-eye", mean: "Do the task with support from the Chef.", icon: "hand", color: "bg-orange-400", border: "border-orange-500", resp: "Trying!", ex: "Step 2: Practice with help." },
            { cat: "STEPS", title: "OWN", phon: "O-wn", mean: "You are the expert. Do it independently.", icon: "star", color: "bg-yellow-400 text-black", border: "border-yellow-500", resp: "I own this!", ex: "Step 3: Mastery and Service." },
            { cat: "STEPS", title: "SOUND!", phon: "Sound", mean: "A loud sound is about to happen (Countdown).", icon: "volume-2", color: "bg-purple-400", border: "border-purple-500", resp: "Ready for sound!", ex: "Chef counts 3-2-1 before using a blender." },
            { cat: "STEPS", title: "PRE-MADE", phon: "Pre-made", mean: "Prepared in advance. Use it to finish the dish.", icon: "package", color: "bg-slate-400", border: "border-slate-500", resp: "Using pre-made!", ex: "South Asian spice mix or herb butter." },
            { cat: "STEPS", title: "ACTIVITY", phon: "Activity", mean: "A group task we all do together.", icon: "users", color: "bg-indigo-400", border: "border-indigo-500", resp: "Let's go!", ex: "The Huddle or the Scavenger Hunt." },
            
            // ADVOCACY CATEGORY
            { cat: "ADVOCACY", title: "MY RIGHTS", phon: "My Rights", mean: "I have the right to ask for what I need.", icon: "shield", color: "bg-pink-500", border: "border-pink-600", resp: "Advocating!", ex: "Rights to breaks, silence, and help." },
            { cat: "ADVOCACY", title: "TAKE A BREAK", phon: "Break", mean: "I can step away any time. No need to ask.", icon: "coffee", color: "bg-pink-500", border: "border-pink-600", resp: "Taking a recharge!", ex: "Go to the exit or the stool when overwhelmed." },
            { cat: "ADVOCACY", title: "ADJUST IT", phon: "Adjust", mean: "I can do it differently if the way isn't working.", icon: "settings", color: "bg-pink-500", border: "border-pink-600", resp: "Adjusting task!", ex: "Changing how I hold a tool or stand." },
            { cat: "ADVOCACY", title: "SELF-ADVOCACY", phon: "Speak Up", mean: "A chance to share what you need with the Chef.", icon: "message-circle", color: "bg-pink-500", border: "border-pink-600", resp: "Heard, we will adjust!", ex: "Asking for the light to be dimmed." }
        ];

        let currentFilter = 'ALL';

        function setFilter(f) {
            currentFilter = f;
            const buttons = ['ALL', 'SAFETY', 'LINGO', 'ZONE', 'STEPS', 'ADVOCACY'];
            buttons.forEach(btn => {
                const el = document.getElementById('filter-' + btn);
                if (btn === f) {
                    el.className = "px-5 py-2 rounded-2xl font-bold transition-all bg-blue-600 text-white shadow-lg";
                } else {
                    el.className = "px-5 py-2 rounded-2xl font-bold transition-all text-slate-400 hover:text-white";
                }
            });
            render();
        }

        function render() {
            const container = document.getElementById('lingo-container');
            container.innerHTML = '';
            
            const filteredData = currentFilter === 'ALL' ? masterData : masterData.filter(d => d.cat === currentFilter);
            
            filteredData.forEach(item => {
                const card = document.createElement('div');
                card.className = "card-break flex flex-col h-[700px] border-8 rounded-[3rem] overflow-hidden shadow-2xl bg-white " + item.border;
                
                card.innerHTML = `
                    <div class="p-8 flex flex-col items-center justify-center text-white ${item.color}">
                        <div class="bg-white/20 p-6 rounded-full mb-4">
                            <i data-lucide="${item.icon}" class="w-20 h-20"></i>
                        </div>
                        <h2 class="text-5xl font-black uppercase tracking-tighter text-center leading-none italic">${item.title}</h2>
                        <p class="text-xl font-medium opacity-90 mt-3 tracking-widest uppercase italic font-bold">[${item.phon}]</p>
                    </div>
                    <div class="flex-1 p-8 flex flex-col justify-between">
                        <div>
                            <div class="flex justify-between items-center mb-2">
                                <h3 class="text-slate-400 uppercase font-black text-xs tracking-widest">Meaning</h3>
                                <span class="bg-slate-100 text-slate-400 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest">${item.cat}</span>
                            </div>
                            <p class="text-3xl font-black text-slate-800 leading-tight">${item.mean}</p>
                        </div>
                        <div class="bg-slate-50 p-6 rounded-[2rem] border-2 border-dashed border-slate-200">
                            <h3 class="text-slate-400 uppercase font-black text-xs tracking-widest mb-2 flex items-center gap-2">
                                <i data-lucide="volume-2" class="w-3 h-3"></i> Team Response
                            </h3>
                            <p class="text-2xl font-black text-blue-700 italic uppercase">"${item.resp}"</p>
                        </div>
                        <div class="pt-4 border-t border-slate-100">
                            <p class="text-slate-400 uppercase font-black text-xs tracking-widest mb-1">When to use</p>
                            <p class="text-lg text-slate-600 font-medium italic">"${item.ex}"</p>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
            lucide.createIcons();
        }

        render();
    </script>
</body>
</html>
