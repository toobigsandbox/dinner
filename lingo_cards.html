<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Label & Lingo Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans', sans-serif; }
        
        /* PRINT OPTIMIZATION FOR HALF-PAGE LANDSCAPE */
        @media print {
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            .no-print { display: none !important; }
            body { background: white !important; padding: 0 !important; margin: 0 !important; }
            
            #lingo-container { 
                display: block !important; 
            }

            /* Each card is half an 11-inch page height (approx 5 inches) */
            .card-break { 
                height: 5in !important; 
                width: 7.5in !important; 
                margin: 0 auto 0.2in auto !important; 
                border: 4px solid #e2e8f0 !important;
                page-break-after: auto !important;
                break-inside: avoid !important;
                display: flex !important;
                flex-direction: row !important; /* Horizontal layout for landscape feel */
            }

            /* Ensure two fit on one portrait page */
            .card-break:nth-child(even) {
                page-break-after: always !important;
            }

            #portal-selection { display: none !important; }
        }

        .portal-card:hover { transform: translateY(-10px); }
    </style>
</head>
<body class="bg-slate-900 min-h-screen p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        
        <!-- Portal Selection Screen -->
        <div id="portal-selection" class="min-h-[80vh] flex flex-col justify-center items-center py-10">
            <h1 class="text-6xl font-black text-white uppercase italic tracking-tighter mb-4 text-center">Master <span class="text-emerald-400">Labels</span></h1>
            <p class="text-slate-400 text-xl mb-12 text-center max-w-xl italic">Half-Page Landscape Cards • Color-Coded to the Atrium Café Legend</p>
            
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 w-full max-w-6xl">
                <!-- Safety Portal -->
                <button onclick="setFilter('SAFETY')" class="portal-card bg-white rounded-[2rem] p-8 text-left transition-all duration-300 border-b-[12px] border-red-500 group shadow-2xl">
                    <div class="bg-red-100 w-14 h-14 rounded-2xl flex items-center justify-center mb-4 group-hover:bg-red-500 group-hover:text-white transition-colors">
                        <i data-lucide="alert-triangle" class="w-7 h-7"></i>
                    </div>
                    <h2 class="text-2xl font-black text-slate-900 uppercase italic mb-1">Safety Zone</h2>
                    <p class="text-slate-500 text-sm font-medium">Heat, Sharp, and Danger (Red).</p>
                </button>

                <!-- Earth Portal -->
                <button onclick="setFilter('EARTH')" class="portal-card bg-white rounded-[2rem] p-8 text-left transition-all duration-300 border-b-[12px] border-emerald-500 group shadow-2xl">
                    <div class="bg-emerald-100 w-14 h-14 rounded-2xl flex items-center justify-center mb-4 group-hover:bg-emerald-500 group-hover:text-white transition-colors">
                        <i data-lucide="leaf" class="w-7 h-7"></i>
                    </div>
                    <h2 class="text-2xl font-black text-slate-900 uppercase italic mb-1">Earth Zone</h2>
                    <p class="text-slate-500 text-sm font-medium">Regulation and Wash (Light Green).</p>
                </button>

                <!-- River Portal -->
                <button onclick="setFilter('RIVER')" class="portal-card bg-white rounded-[2rem] p-8 text-left transition-all duration-300 border-b-[12px] border-blue-500 group shadow-2xl">
                    <div class="bg-blue-100 w-14 h-14 rounded-2xl flex items-center justify-center mb-4 group-hover:bg-blue-600 group-hover:text-white transition-colors">
                        <i data-lucide="wind" class="w-7 h-7"></i>
                    </div>
                    <h2 class="text-2xl font-black text-slate-900 uppercase italic mb-1">River Runway</h2>
                    <p class="text-slate-500 text-sm font-medium">Movement and TRY Stage (Blue).</p>
                </button>
            </div>

            <div class="mt-12 flex flex-wrap justify-center gap-6">
                <button onclick="setFilter('ALL')" class="text-slate-500 hover:text-white font-bold uppercase tracking-widest text-xs underline decoration-2 underline-offset-8">All Labels</button>
                <button onclick="setFilter('VOICE')" class="text-slate-500 hover:text-white font-bold uppercase tracking-widest text-xs underline decoration-2 underline-offset-8">Voice (Purple)</button>
                <button onclick="setFilter('TRANSITION')" class="text-slate-500 hover:text-white font-bold uppercase tracking-widest text-xs underline decoration-2 underline-offset-8">Reflection (Yellow)</button>
            </div>
        </div>

        <!-- Tool Header -->
        <header id="tool-header" class="hidden flex flex-col lg:flex-row justify-between items-start lg:items-center mb-10 gap-6 no-print">
            <div>
                <button onclick="showPortal()" class="text-emerald-400 font-bold uppercase tracking-widest text-xs flex items-center gap-2 mb-2 hover:text-emerald-300">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Portals
                </button>
                <h1 id="portal-title" class="text-4xl font-black text-white italic tracking-tighter uppercase leading-none">Master Labels</h1>
            </div>
            
            <div class="flex flex-wrap gap-2 bg-slate-800 p-2 rounded-2xl border border-slate-700">
                <button onclick="setFilter('ALL')" id="filter-ALL" class="px-4 py-2 rounded-xl font-bold transition-all text-slate-400">All</button>
                <button onclick="setFilter('ANCHOR')" id="filter-ANCHOR" class="px-4 py-2 rounded-xl font-bold transition-all text-slate-400">Anchor</button>
                <button onclick="setFilter('RIVER')" id="filter-RIVER" class="px-4 py-2 rounded-xl font-bold transition-all text-slate-400">River</button>
                <button onclick="setFilter('SAFETY')" id="filter-SAFETY" class="px-4 py-2 rounded-xl font-bold transition-all text-slate-400">Safety</button>
                <button onclick="setFilter('EARTH')" id="filter-EARTH" class="px-4 py-2 rounded-xl font-bold transition-all text-slate-400">Earth</button>
                <button onclick="setFilter('PLATING')" id="filter-PLATING" class="px-4 py-2 rounded-xl font-bold transition-all text-slate-400">Plating</button>
                <button onclick="setFilter('VOICE')" id="filter-VOICE" class="px-4 py-2 rounded-xl font-bold transition-all text-slate-400">Voice</button>
                <button onclick="setFilter('TRANSITION')" id="filter-TRANSITION" class="px-4 py-2 rounded-xl font-bold transition-all text-slate-400">Reflection</button>
            </div>
        </header>

        <div id="lingo-container" class="hidden grid grid-cols-1 xl:grid-cols-2 gap-8">
            <!-- Cards injected via JS -->
        </div>

        <div id="print-footer" class="hidden mt-16 text-center text-slate-500 no-print pb-20">
            <button onclick="window.print()" class="bg-emerald-600 text-white px-10 py-5 rounded-3xl font-black uppercase tracking-widest hover:bg-emerald-500 transition-all shadow-2xl flex items-center gap-3 mx-auto">
                <i data-lucide="printer"></i> Print Landscape Cards (2 per page)
            </button>
        </div>
    </div>

    <script>
        const masterData = [
            // ANCHOR ZONE (Gray)
            { cat: "ANCHOR", title: "WATCH STAGE", phon: "W-otch", mean: "Anchor Zone. Stability and Chef Demos. Eyes on the Chef.", icon: "eye", color: "bg-slate-400", border: "border-slate-500", resp: "Watching!", ex: "The start of every new skill walkthrough." },
            { cat: "ANCHOR", title: "DRESS READY", phon: "Dres Red-ee", mean: "Apron tied tight. Hair tied back. No loose ends.", icon: "user-check", color: "bg-slate-400", border: "border-slate-500", resp: "I am ready!", ex: "Orientation check: Chef can help with hair or aprons." },
            
            // RIVER RUNWAY (Blue)
            { cat: "RIVER", title: "TRY STAGE", phon: "Tr-eye", mean: "River Runway. Movement and Flow. Practice with support.", icon: "hand", color: "bg-blue-500", border: "border-blue-600", resp: "Trying it!", ex: "Practicing a skill while the Chef is nearby." },
            { cat: "RIVER", title: "PUTTING AWAY", phon: "Put A-way", mean: "Return every item to its home. Reset the flow.", icon: "archive", color: "bg-blue-500", border: "border-blue-600", resp: "River Reset!", ex: "Clean tools go back to their labeled spots." },
            { cat: "RIVER", title: "BEHIND!", phon: "Bee-hind", mean: "I am walking behind you. Do not move back!", icon: "navigation", color: "bg-blue-500", border: "border-blue-600", resp: "Heard!", ex: "Critical for River Runway safety." },
            
            // SAFETY ZONE (Red)
            { cat: "SAFETY", title: "HOT!", phon: "H-ot", mean: "Hot surface or steam. Use oven mitt.", icon: "flame", color: "bg-red-600", border: "border-red-700", resp: "Checking Hot!", ex: "Stove, Oven, and Heat Lamp areas." },
            { cat: "SAFETY", title: "SHARP!", phon: "Sh-arp", mean: "This item can cut. Move slowly and tuck fingers.", icon: "alert-triangle", color: "bg-red-600", border: "border-red-700", resp: "Sharp, Heard!", ex: "Knives, Graters, and Mandolins." },
            { cat: "SAFETY", title: "RAW MEAT ONLY", phon: "Raw Meet", mean: "RED BOARD. Only raw meat goes here. No vegetables!", icon: "beef", color: "bg-red-600", border: "border-red-700", resp: "Red Board, Heard!", ex: "Only for the South Asian Spiced Wings." },
            
            // EARTH / REGULATION ZONE (Light Green)
            { cat: "EARTH", title: "GENTLE WASH", phon: "Wash", mean: "Cold running water, gentle rub, place on drying rack.", icon: "droplets", color: "bg-emerald-500", border: "border-emerald-600", resp: "Clean and Ready!", ex: "Wash station: Find the sink with the Green label." },
            { cat: "EARTH", title: "SORT PRODUCE", phon: "Sor-t", mean: "Divide: Fridge, Room Temp, or Wash First.", icon: "list-ordered", color: "bg-emerald-500", border: "border-emerald-600", resp: "Sorted!", ex: "Cucumbers wash, Apples stay out." },
            { cat: "EARTH", title: "VEGGIES ONLY", phon: "Vej-ees", mean: "GREEN BOARD. Only produce goes here. No meat!", icon: "leaf", color: "bg-emerald-500", border: "border-emerald-600", resp: "Green Board!", ex: "Veggies and fruits only on this board." },
            { cat: "EARTH", title: "THE 20s SCRUB", phon: "Skrub", mean: "Scrub with soap for 20 seconds. Scrub-a-dub!", icon: "clock", color: "bg-emerald-500", border: "border-emerald-600", resp: "Clean Hands!", ex: "Orientation: Time yourself while scrubbing." },
            
            // PLATING STATION (Dark Green)
            { cat: "PLATING", title: "OWN STAGE", phon: "O-wn", mean: "Expertise. Familiarity. You do this independently.", icon: "star", color: "bg-emerald-900", border: "border-emerald-950", resp: "I own this!", ex: "The final plating of the 45 dinner portions." },
            { cat: "PLATING", title: "STAGING", phon: "Stay-jing", mean: "Where finished plates wait for service.", icon: "layout", color: "bg-emerald-900", border: "border-emerald-950", resp: "Plates Staged!", ex: "The window between the kitchen and guest room." },
            
            // VOICE / ADVOCACY (Purple)
            { cat: "VOICE", title: "SENSORY CHECK", phon: "Sen-sor-ee", mean: "If water or texture feels bad, tell the Chef.", icon: "shield", color: "bg-purple-600", border: "border-purple-700", resp: "Adjustment Needed!", ex: "Advocacy Wall: Voice your preference." },
            { cat: "VOICE", title: "IN THE WEEDS", phon: "In the weeds", mean: "I am overwhelmed and I need help now.", icon: "help-circle", color: "bg-purple-600", border: "border-purple-700", resp: "How can I help?", ex: "Our dignified code for support." },
            { cat: "VOICE", title: "TAKE A BREAK", phon: "Break", mean: "I can step away any time. No need to ask.", icon: "coffee", color: "bg-purple-600", border: "border-purple-700", resp: "Recharging!", ex: "Go to the stool or patio when overwhelmed." },

            // TRANSITION / REFLECTION (Yellow)
            { cat: "TRANSITION", title: "SKILLS PASSPORT", phon: "Pass-port", mean: "Stickers, integration, and reflection on new skills.", icon: "book-open", color: "bg-yellow-500", border: "border-yellow-600", resp: "Reflecting!", ex: "End of session sticker celebration." },
            { cat: "TRANSITION", title: "DELIGHT!", phon: "Dee-light", mean: "Joy, listening, and teamwork. Our final goal.", icon: "sparkles", color: "bg-yellow-500", border: "border-yellow-600", resp: "Shared Delight!", ex: "When the guest smiles at the meal." }
        ];

        let currentFilter = 'ALL';

        function showPortal() {
            document.getElementById('portal-selection').classList.remove('hidden');
            document.getElementById('tool-header').classList.add('hidden');
            document.getElementById('lingo-container').classList.add('hidden');
            document.getElementById('print-footer').classList.add('hidden');
        }

        function setFilter(f) {
            currentFilter = f;
            document.getElementById('portal-selection').classList.add('hidden');
            document.getElementById('tool-header').classList.remove('hidden');
            document.getElementById('lingo-container').classList.remove('hidden');
            document.getElementById('print-footer').classList.remove('hidden');

            const titleMap = {
                'ANCHOR': 'Anchor Zone (Gray)',
                'RIVER': 'River Runway (Blue)',
                'SAFETY': 'Safety Zone (Red)',
                'EARTH': 'Earth Regulation Zone (Green)',
                'PLATING': 'Plating Station (D.Green)',
                'VOICE': 'Voice & Advocacy (Purple)',
                'TRANSITION': 'Transition Station (Yellow)',
                'ALL': 'Master Label Library'
            };
            document.getElementById('portal-title').innerText = titleMap[f] || 'Master Labels';

            const buttons = ['ALL', 'ANCHOR', 'RIVER', 'SAFETY', 'EARTH', 'PLATING', 'VOICE', 'TRANSITION'];
            buttons.forEach(btn => {
                const el = document.getElementById('filter-' + btn);
                if (el) {
                    if (btn === f) {
                        el.className = "px-4 py-2 rounded-xl font-bold transition-all bg-emerald-600 text-white shadow-lg";
                    } else {
                        el.className = "px-4 py-2 rounded-xl font-bold transition-all text-slate-400 hover:text-white";
                    }
                }
            });
            render();
        }

        function render() {
            const container = document.getElementById('lingo-container');
            container.innerHTML = '';
            
            const filteredData = currentFilter === 'ALL' ? masterData : masterData.filter(d => d.cat === currentFilter);
            
            filteredData.forEach(item => {
                const card = document.createElement('div');
                const containerClassList = [
                    "card-break", "flex", "flex-col", "md:flex-row", "min-h-[400px]", "md:min-h-[4.5in]", 
                    "border-[10px]", "rounded-[2.5rem]", "overflow-hidden", 
                    "shadow-2xl", "bg-white", item.border
                ];
                card.className = containerClassList.join(" ");
                
                card.innerHTML = `
                    <div class="w-full md:w-2/5 p-6 flex flex-col items-center justify-center text-white ${item.color}">
                        <div class="bg-white/20 p-4 rounded-full mb-3">
                            <i data-lucide="${item.icon}" class="w-16 h-16"></i>
                        </div>
                        <h2 class="text-4xl font-black uppercase tracking-tighter text-center leading-tight italic">${item.title}</h2>
                        <p class="text-lg font-bold opacity-90 mt-2 tracking-widest uppercase italic">[${item.phon}]</p>
                    </div>
                    <div class="flex-1 p-8 flex flex-col justify-between bg-white overflow-hidden">
                        <div class="mb-4">
                            <div class="flex justify-between items-center mb-2">
                                <h3 class="text-slate-400 uppercase font-black text-[10px] tracking-widest">Meaning</h3>
                                <span class="bg-slate-100 text-slate-400 px-2 py-0.5 rounded-full text-[8px] font-black uppercase tracking-widest">${item.cat}</span>
                            </div>
                            <p class="text-2xl md:text-3xl font-black text-slate-800 leading-tight">${item.mean}</p>
                        </div>
                        <div class="space-y-4">
                            <div class="bg-slate-50 p-4 rounded-[1.5rem] border-2 border-dashed border-slate-200">
                                <h3 class="text-slate-400 uppercase font-black text-[10px] tracking-widest mb-1 flex items-center gap-2">
                                    <i data-lucide="volume-2" class="w-3 h-3"></i> Team Response
                                </h3>
                                <p class="text-xl font-black text-blue-700 italic uppercase">"${item.resp}"</p>
                            </div>
                            <div class="pt-4 border-t-2 border-slate-100">
                                <p class="text-slate-400 uppercase font-black text-[10px] tracking-widest mb-1">Practical Use</p>
                                <p class="text-base text-slate-600 font-medium italic leading-snug">"${item.ex}"</p>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
            lucide.createIcons();
        }

        lucide.createIcons();
    </script>
</body>
</html>
