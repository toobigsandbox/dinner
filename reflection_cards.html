<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skills Passport - Reflection Cards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans', sans-serif; background-color: #f8fafc; }
        
        /* Print Optimization */
        @media print {
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            body { background: white !important; margin: 0; padding: 0; }
            .no-print { display: none !important; }
            
            @page { size: letter portrait; margin: 0.5in; }
            
            .print-container {
                display: grid !important;
                grid-template-columns: 1fr 1fr;
                gap: 0.3in;
                box-shadow: none !important;
                background: white !important;
                padding: 0 !important;
                margin: 0 !important;
            }

            .reflection-card {
                page-break-inside: avoid;
                height: 4.75in; /* Forces 4 cards per page perfectly */
                box-shadow: none !important;
            }
        }

        /* Screen Preview Styles */
        .preview-container { 
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 2rem; 
            padding: 2rem; 
            max-width: 1100px;
            margin: 0 auto;
        }
        
        .reflection-card {
            background: white;
            border: 2px dashed #cbd5e1; /* Dashed slate-300 */
            border-radius: 1.5rem;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            min-height: 4.75in;
        }
    </style>
</head>
<body>
    <!-- Screen Controls -->
    <div class="no-print bg-slate-900 text-white p-8 text-center sticky top-0 z-50 shadow-2xl">
        <h1 class="text-4xl font-black uppercase italic tracking-tighter mb-2 text-yellow-400 flex items-center justify-center gap-3">
            <i data-lucide="book-open" class="w-8 h-8"></i> Reflection Prompts
        </h1>
        <p class="text-slate-400 mb-6">Pixel-perfect redesign matching the Yellow Transition Station aesthetics.</p>
        <button onclick="window.print()" class="bg-yellow-500 hover:bg-yellow-400 text-slate-900 font-black uppercase tracking-widest px-8 py-4 rounded-2xl flex items-center gap-3 mx-auto transition-all shadow-lg shadow-yellow-500/20">
            <i data-lucide="printer"></i> Print Passport Cards
        </button>
    </div>

    <!-- Printable Cards Container -->
    <div class="preview-container print-container" id="cards-container">
        <!-- Cards Injected via JS -->
    </div>

    <script>
        const prompts = [
            {
                title: "First Knife Skills",
                icon: "scissors",
                focus: "Confidence",
                prompt: "We practiced the Pinch and Claw grips today. What was the hardest part, and how did you adjust?"
            },
            {
                title: "Kitchen Lingo",
                icon: "message-square",
                focus: "Delightfulness",
                prompt: "We used words like 'Behind!' and 'Heard!' today. How did it feel to talk with the team this way?"
            },
            {
                title: "The Kitchen Space",
                icon: "map",
                focus: "Orientation",
                prompt: "We walked the whole kitchen today. Which color zone felt the most comfortable to you, and why?"
            },
            {
                title: "My Voice",
                icon: "shield",
                focus: "Self-Advocacy",
                prompt: "You chose a communication method today. How did it feel to use it when you needed something?"
            },
            {
                title: "Meet the Ingredients",
                icon: "leaf",
                focus: "Lived Experience",
                prompt: "We sorted and washed produce today. Which ingredient had the most interesting smell or texture?"
            },
            {
                title: "Open Reflection",
                icon: "sparkles",
                focus: "Integration",
                prompt: "Draw or write one thing you are proud of doing today, or one thing you are excited for next week!"
            }
        ];

        const container = document.getElementById('cards-container');

        prompts.forEach((card) => {
            const cardHTML = `
                <div class="reflection-card">
                    
                    <!-- Sticker Target (Corner Overlap) -->
                    <div class="absolute -top-4 -right-4 w-20 h-20 bg-white rounded-full border-[3px] border-dashed border-yellow-400 flex items-center justify-center transform rotate-12 z-10">
                        <p class="text-[10px] font-black text-yellow-500 uppercase text-center leading-tight">Place<br/>Sticker<br/>Here!</p>
                    </div>

                    <!-- Header -->
                    <div class="flex items-center gap-4 mb-6 relative z-0">
                        <div class="border-2 border-yellow-200 bg-yellow-50 text-yellow-600 p-3 rounded-2xl shrink-0">
                            <i data-lucide="${card.icon}" class="w-6 h-6"></i>
                        </div>
                        <div class="flex flex-col">
                            <p class="text-[9px] font-black uppercase text-yellow-600 tracking-widest mb-0.5">Day One • ${card.focus}</p>
                            <h2 class="text-2xl font-black text-slate-900 uppercase italic tracking-tighter leading-none">${card.title}</h2>
                        </div>
                    </div>

                    <!-- Prompt -->
                    <p class="text-[15px] font-bold text-slate-600 leading-snug mb-6 pr-4">
                        ${card.prompt}
                    </p>

                    <!-- Lined Writing Area -->
                    <div class="flex-1 border-2 border-slate-100 rounded-3xl flex flex-col overflow-hidden">
                        <div class="h-12 border-b-2 border-slate-100 flex items-center justify-center bg-white">
                            <span class="text-[9px] font-black text-slate-300 uppercase tracking-widest">Write or draw your answer here</span>
                        </div>
                        <div class="h-12 border-b-2 border-slate-100 bg-white"></div>
                        <div class="h-12 border-b-2 border-slate-100 bg-white"></div>
                        <div class="flex-1 bg-slate-50/50"></div>
                    </div>

                </div>
            `;
            container.insertAdjacentHTML('beforeend', cardHTML);
        });

        lucide.createIcons();
    </script>
</body>
</html>
