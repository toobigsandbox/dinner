<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plating Station - Visual Study Guide</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans', sans-serif; background-color: #f8fafc; }
        
        /* Zone border colors */
        .border-anchor   { border-color: #94a3b8; }
        .border-river    { border-color: #3b82f6; }
        .border-safety   { border-color: #ef4444; }
        .border-earth    { border-color: #10b981; }
        .border-plating  { border-color: #0f766e; } /* Teal-700 */
        .border-advocacy { border-color: #a855f7; }
        .border-transition { border-color: #eab308; }

        /* Plating Animations */
        @keyframes drop-in {
            0% { transform: translateY(-20px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        .anim-drop { animation: drop-in 0.6s ease-out forwards; }
        
        @keyframes fade-in-layer {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }
        .anim-layer { animation: fade-in-layer 1s ease-out forwards; }

        /* STRICT US LETTER PRINT OPTIMIZATION */
        .print-only { display: none; }
        
        @media print {
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            body { background: white !important; margin: 0 !important; padding: 0 !important; }
            .no-print, header, footer, #display-area { display: none !important; }
            .print-only { display: block !important; }
            
            @page { size: letter portrait; margin: 0.25in; }
            
            #print-area {
                width: 8in !important;
                margin: 0 auto !important;
                padding: 0.25in !important;
                box-sizing: border-box;
            }

            .print-card { page-break-inside: avoid; }
            
            /* Clean up animations for print */
            .anim-drop, .anim-layer { animation: none !important; transform: none !important; opacity: 1 !important; }
        }
    </style>
</head>
<body class="bg-slate-900 min-h-screen p-4 md:p-8 font-sans">
<div class="max-w-7xl mx-auto">

    <!-- Header -->
    <header class="flex flex-col lg:flex-row justify-between items-start lg:items-end mb-10 gap-6">
        <div class="space-y-2">
            <div class="inline-flex items-center gap-2 bg-teal-600/20 text-teal-400 px-4 py-1 rounded-full text-sm font-bold uppercase border border-teal-600/30">
                <i data-lucide="palette" class="w-4 h-4"></i> Plating Station (Dark Green Zone)
            </div>
            <h1 class="text-4xl md:text-6xl font-black text-white uppercase italic tracking-tighter">Menu Plating Guide</h1>
            <p class="text-slate-400 font-medium">Flagship Dinner Edition · Step-by-Step Visual Build</p>
        </div>

        <div class="flex flex-col gap-4 w-full lg:max-w-3xl items-end">
            <button onclick="window.print()" class="no-print bg-slate-100 hover:bg-white text-slate-900 font-black uppercase tracking-widest px-6 py-3 rounded-2xl flex items-center gap-2 transition-all shadow-lg w-full md:w-auto justify-center">
                <i data-lucide="printer" class="w-5 h-5"></i> Print Dish Cheat Sheet
            </button>
            <div class="flex flex-wrap gap-2 w-full">
                <button onclick="selectModule(0)" id="tab-0" class="px-5 py-2 rounded-2xl font-black uppercase text-sm transition-all bg-white text-slate-900 shadow-xl flex-1 md:flex-none">🥗 Cabbage Salad</button>
                <button onclick="selectModule(1)" id="tab-1" class="px-5 py-2 rounded-2xl font-black uppercase text-sm transition-all text-slate-400 hover:text-white flex-1 md:flex-none">🍗 Spiced Chicken</button>
                <button onclick="selectModule(2)" id="tab-2" class="px-5 py-2 rounded-2xl font-black uppercase text-sm transition-all text-slate-400 hover:text-white flex-1 md:flex-none">🍚 Rice Pudding</button>
                <button onclick="selectModule(3)" id="tab-3" class="px-5 py-2 rounded-2xl font-black uppercase text-sm transition-all text-slate-400 hover:text-white flex-1 md:flex-none">🥒 Apps & Skewers</button>
            </div>
        </div>
    </header>

    <!-- Main Display (Screen) -->
    <main id="display-area" class="min-h-[650px] lg:min-h-[750px] flex flex-col">
        <!-- Injected by JS -->
    </main>

    <!-- Print Display (Hidden on Screen, Visible on Print) -->
    <div id="print-area" class="print-only">
        <!-- Injected by JS -->
    </div>

    <!-- Footer Legend (Screen) -->
    <footer class="mt-8 grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-3 no-print">
        <div class="bg-slate-800 p-4 rounded-2xl border-t-4 border-slate-400 text-center">
            <p class="text-[10px] font-black text-slate-400 uppercase">Anchor</p>
            <p class="text-[9px] text-white/60">WATCH Stage</p>
        </div>
        <div class="bg-slate-800 p-4 rounded-2xl border-t-4 border-blue-500 text-center">
            <p class="text-[10px] font-black text-blue-400 uppercase">River</p>
            <p class="text-[9px] text-white/60">TRY Stage</p>
        </div>
        <div class="bg-slate-800 p-4 rounded-2xl border-t-4 border-red-500 text-center">
            <p class="text-[10px] font-black text-red-500 uppercase">Safety</p>
            <p class="text-[9px] text-white/60">Heat & Sharp</p>
        </div>
        <div class="bg-slate-800 p-4 rounded-2xl border-t-4 border-emerald-500 text-center">
            <p class="text-[10px] font-black text-emerald-400 uppercase">Earth</p>
            <p class="text-[9px] text-white/60">Regulation</p>
        </div>
        <div class="bg-slate-800 p-4 rounded-2xl border-t-4 border-teal-700 text-center">
            <p class="text-[10px] font-black text-teal-500 uppercase">Plating</p>
            <p class="text-[9px] text-white/60">OWN Stage</p>
        </div>
        <div class="bg-slate-800 p-4 rounded-2xl border-t-4 border-purple-500 text-center">
            <p class="text-[10px] font-black text-purple-400 uppercase">Voice</p>
            <p class="text-[9px] text-white/60">Advocacy</p>
        </div>
        <div class="bg-slate-800 p-4 rounded-2xl border-t-4 border-yellow-500 text-center">
            <p class="text-[10px] font-black text-yellow-500 uppercase">Transition</p>
            <p class="text-[9px] text-white/60">Reflection</p>
        </div>
    </footer>
</div>

<script>
const modules = [
    // ── MODULE 0: CABBAGE SALAD ─────────────────────────────────────────────────
    {
        title: "Charred Cabbage Wedge", emoji: "🥗",
        tip: "Build from left to right. Let the bright orange carrots pop against the dark plate!",
        ingredients: [
            { n: "Cabbage", e: "🥬" },
            { n: "Carrots", e: "🥕" },
            { n: "Onion & Sauce", e: "🧅" },
            { n: "Pecans", e: "🥜" }
        ],
        heroVisual: `
            <div class="flex flex-col items-center justify-center w-full gap-4">
                <div class="relative w-48 h-48 rounded-full bg-slate-100 border-4 border-slate-300 shadow-xl flex items-center justify-center overflow-hidden">
                    <!-- Cabbage Wedge -->
                    <div class="absolute left-6 w-16 h-32 bg-emerald-100 border-2 border-emerald-800 rounded-l-full rounded-r-sm overflow-hidden flex flex-col gap-2 py-2 shadow-sm z-10">
                        <div class="w-full h-1 bg-emerald-800/40"></div>
                        <div class="w-full h-1 bg-slate-800/60"></div>
                        <div class="w-full h-1 bg-emerald-800/40"></div>
                        <div class="w-full h-1 bg-slate-800/60"></div>
                    </div>
                    
                    <!-- Carrot Ribbons -->
                    <div class="absolute right-6 top-10 flex flex-col gap-[-4px] anim-layer" style="animation-delay: 0.2s;">
                        <div class="w-12 h-12 rounded-full border-4 border-orange-400 bg-transparent shadow-sm"></div>
                        <div class="w-12 h-12 rounded-full border-4 border-orange-400 bg-transparent -mt-6 shadow-sm"></div>
                        <div class="w-12 h-12 rounded-full border-4 border-orange-400 bg-transparent -mt-6 shadow-sm"></div>
                    </div>

                    <!-- Onions & Sauce -->
                    <div class="absolute inset-0 flex items-center justify-center anim-layer z-20" style="animation-delay: 0.4s;">
                        <span class="text-4xl translate-x-[-10px] translate-y-[-10px]">🧅</span>
                        <!-- Drizzle -->
                        <svg class="absolute top-10 left-8 w-24 h-24" fill="none">
                            <path d="M10,20 Q30,0 50,20 T90,20" stroke="#b45309" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
                        </svg>
                    </div>

                    <!-- Pecans -->
                    <div class="absolute bottom-6 flex justify-around w-full px-8 anim-layer z-20" style="animation-delay: 0.6s;">
                        <span class="text-lg">🥜</span>
                        <span class="text-lg">🥜</span>
                        <span class="text-lg">🥜</span>
                    </div>
                </div>
            </div>
        `,
        steps: [
            { l: "WATCH", a: "THE WEDGE", d: "Anchor Zone: Chef places a single charred cabbage wedge on the left side of the plate.", i: "layout-panel-left", zone: "border-anchor" },
            { l: "TRY", a: "CARROT RIBBONS", d: "Plating Station: Place a cluster of sliced carrot ribbons next to the cabbage on the right side.", i: "carrot", zone: "border-plating" },
            { l: "TRY", a: "ONIONS & SAUCE", d: "Plating Station: Add red onions over the cabbage. Drizzle sauce over the upper half of the plate.", i: "droplets", zone: "border-plating" },
            { l: "OWN", a: "PECAN FINISH", d: "Plating Station: Sprinkle chopped pecans along the bottom edge to finish. Call 'Hands!'", i: "star", zone: "border-plating" }
        ]
    },

    // ── MODULE 1: CHESTNUT SPICED CHICKEN ──────────────────────────────────────────────
    {
        title: "Chettinad Spiced Chicken", emoji: "🍗",
        tip: "Count carefully: exactly 6 pieces per plate. Group them tightly so they stay warm!",
        ingredients: [
            { n: "Chicken", e: "🍗" },
            { n: "Sauce Cup", e: "🥛" },
            { n: "Tongs", e: "🥢" },
            { n: "Clean Plate", e: "🍽️" }
        ],
        heroVisual: `
            <div class="flex flex-col items-center justify-center w-full gap-6">
                <div class="relative w-48 h-48 rounded-full bg-slate-100 border-4 border-slate-300 shadow-xl flex items-center justify-center overflow-hidden">
                    <!-- Chicken Pieces -->
                    <div class="anim-layer relative w-full h-full" style="animation-delay: 0.2s;">
                        <div class="absolute left-6 top-8 w-12 h-16 bg-amber-700 rounded-[2rem] border-2 border-amber-900 rotate-12 shadow-sm"></div>
                        <div class="absolute left-16 top-6 w-14 h-12 bg-amber-700 rounded-[2rem] border-2 border-amber-900 -rotate-12 shadow-sm"></div>
                        <div class="absolute left-6 bottom-10 w-12 h-14 bg-amber-700 rounded-[2rem] border-2 border-amber-900 -rotate-12 shadow-sm"></div>
                        <div class="absolute left-16 bottom-8 w-14 h-12 bg-amber-700 rounded-[2rem] border-2 border-amber-900 rotate-12 shadow-sm"></div>
                        <div class="absolute left-24 top-16 w-12 h-16 bg-amber-700 rounded-[2rem] border-2 border-amber-900 rotate-45 shadow-sm"></div>
                        <div class="absolute left-20 bottom-16 w-12 h-12 bg-amber-700 rounded-[2rem] border-2 border-amber-900 -rotate-45 shadow-sm"></div>
                    </div>
                    
                    <!-- Sauce Cup -->
                    <div class="absolute right-6 top-16 w-16 h-16 bg-white rounded-full border-4 border-slate-300 flex items-center justify-center shadow-lg anim-layer" style="animation-delay: 0.4s;">
                        <div class="w-10 h-10 bg-slate-100 rounded-full shadow-inner border border-slate-200"></div>
                    </div>
                </div>
            </div>
        `,
        steps: [
            { l: "WATCH", a: "CLEAN PLATE", d: "Anchor Zone: Chef shows the clean plate layout. The sauce cup goes on the right side.", i: "circle-dashed", zone: "border-anchor" },
            { l: "TRY", a: "COUNT TO SIX", d: "Plating Station: Use your tongs to grab exactly 6 spiced chicken pieces.", i: "hash", zone: "border-plating" },
            { l: "TRY", a: "THE CLUSTER", d: "Plating Station: Place the 6 pieces tightly together on the left side of the plate. Don't spread them out.", i: "minimize-2", zone: "border-plating" },
            { l: "OWN", a: "SAUCE CUP", d: "Plating Station: Add the filled sauce cup next to the chicken. Wipe any drips. Call 'Hands!'", i: "star", zone: "border-plating" }
        ]
    },

    // ── MODULE 2: RICE PUDDING ──────────────────────────────────────────────
    {
        title: "Cardamom Rice Pudding", emoji: "🍚",
        tip: "Fill just below the rim to keep the edges clean. Center the strawberries for a beautiful bullseye.",
        ingredients: [
            { n: "Bowl", e: "🥣" },
            { n: "Pudding", e: "🍚" },
            { n: "Strawberries", e: "🍓" },
            { n: "Clean Rim", e: "🧼" }
        ],
        heroVisual: `
            <div class="flex flex-col md:flex-row items-center justify-center gap-8 w-full">
                <div class="relative w-40 h-40 rounded-full bg-amber-50 border-8 border-amber-200 shadow-xl flex items-center justify-center overflow-hidden">
                    <!-- Pudding -->
                    <div class="absolute inset-2 bg-slate-50 rounded-full shadow-inner border-2 border-slate-200 flex items-center justify-center anim-layer">
                        <!-- Strawberries -->
                        <div class="relative w-20 h-20 flex flex-wrap justify-center items-center content-center gap-0.5 anim-drop" style="animation-delay: 0.4s;">
                            <span class="text-2xl drop-shadow-sm transform -rotate-12">🍓</span>
                            <span class="text-2xl drop-shadow-sm transform rotate-12">🍓</span>
                            <span class="text-2xl drop-shadow-sm transform rotate-45">🍓</span>
                            <span class="text-2xl drop-shadow-sm transform -rotate-45">🍓</span>
                        </div>
                    </div>
                </div>
            </div>
        `,
        steps: [
            { l: "WATCH", a: "THE FILL LINE", d: "Anchor Zone: Chef demonstrates spooning pudding into the bowl, stopping just below the rim.", i: "arrow-down-to-line", zone: "border-anchor" },
            { l: "TRY", a: "SPOON PUDDING", d: "Plating Station: Gently spoon the rice pudding into your bowl. Keep the outside rim perfectly clean.", i: "utensils", zone: "border-plating" },
            { l: "TRY", a: "THE BULLSEYE", d: "Plating Station: Place the grilled strawberries exactly in the center of the pudding.", i: "target", zone: "border-plating" },
            { l: "OWN", a: "WIPE & SERVE", d: "Plating Station: Use a clean finger-towel to wipe any smudges off the rim. Call 'Hands!'", i: "star", zone: "border-plating" }
        ]
    },

    // ── MODULE 3: CUCUMBER & SKEWERS ─────────────────────────────────────────────────
    {
        title: "Appetizers & Skewers", emoji: "🥒",
        tip: "These are the first bites guests will see! Make the yogurt dollop neat and the glaze drizzle deliberate.",
        ingredients: [
            { n: "Cucumbers", e: "🥒" },
            { n: "Yogurt", e: "🥣" },
            { n: "Skewers", e: "🍢" },
            { n: "Glaze", e: "🖌️" }
        ],
        heroVisual: `
            <div class="flex flex-col items-center justify-center w-full gap-4">
                <div class="relative w-48 h-48 rounded-full bg-slate-50 border-4 border-slate-200 shadow-xl flex flex-col items-center justify-center">
                    <div class="flex gap-4 items-center">
                        <!-- Cucumber -->
                        <div class="relative w-16 h-16 bg-emerald-200 border-4 border-emerald-500 rounded-full flex items-center justify-center shadow-md anim-layer">
                            <div class="w-10 h-10 bg-white rounded-full opacity-90 shadow-sm"></div>
                            <!-- Balsamic Drizzle -->
                            <svg class="absolute w-14 h-14" fill="none">
                                <path d="M0,7 Q7,0 14,7 T28,7" stroke="#451a03" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
                            </svg>
                        </div>
                        
                        <!-- Skewer -->
                        <div class="relative w-24 h-6 flex items-center justify-center rotate-[-15deg] anim-layer" style="animation-delay: 0.3s;">
                            <div class="absolute w-full h-1.5 bg-amber-200 rounded-full"></div>
                            <div class="w-6 h-6 bg-rose-700 rounded-md relative z-10 border-2 border-rose-900 mr-1 shadow-sm"></div>
                            <div class="w-6 h-6 bg-amber-400 rounded-md relative z-10 border-2 border-amber-600 mr-1 shadow-sm"></div>
                            <div class="w-6 h-6 bg-rose-700 rounded-md relative z-10 border-2 border-rose-900 shadow-sm"></div>
                        </div>
                    </div>
                </div>
            </div>
        `,
        steps: [
            { l: "WATCH", a: "GLAZE BRUSH", d: "Anchor Zone: Chef shows how to brush the Beet & Apple Skewers with glaze using the pastry brush.", i: "paint-brush", zone: "border-anchor" },
            { l: "TRY", a: "CUCUMBER ROUNDS", d: "Plating Station: Place a grilled cucumber round flat on the plate. Top it neatly with a spoon of yogurt sauce.", i: "circle", zone: "border-plating" },
            { l: "TRY", a: "THE DRIZZLE", d: "Plating Station: Drizzle balsamic glaze over the yogurt. Keep it clean and artistic.", i: "droplets", zone: "border-plating" },
            { l: "OWN", a: "PLATE SKEWERS", d: "Plating Station: Lay the brushed skewers next to the cucumber. Call 'Hands!'", i: "star", zone: "border-plating" }
        ]
    }
];

let currentModule = 0;
let currentStep   = 0;

function selectModule(idx) {
    currentModule = idx;
    currentStep   = 0;
    modules.forEach((_, i) => {
        const tab = document.getElementById('tab-' + i);
        if (!tab) return;
        if (i === idx) {
            tab.className = "px-5 py-2 rounded-2xl font-black uppercase text-sm transition-all bg-white text-slate-900 shadow-xl flex-1 md:flex-none";
        } else {
            tab.className = "px-5 py-2 rounded-2xl font-black uppercase text-sm transition-all text-slate-400 hover:text-white flex-1 md:flex-none";
        }
    });
    render();
}

function next() {
    const steps = modules[currentModule].steps;
    if (currentStep < steps.length - 1) { currentStep++; render(); }
}

function prev() {
    if (currentStep > 0) { currentStep--; render(); }
}

function render() {
    const mod  = modules[currentModule];
    const step = mod.steps[currentStep];

    const labelStyle = {
        WATCH:    "bg-slate-100 border-slate-400 text-slate-600",
        TRY:      "bg-teal-50 border-teal-500 text-teal-700",
        ADVOCATE: "bg-purple-50 border-purple-500 text-purple-600",
        OWN:      "bg-yellow-50 border-yellow-500 text-yellow-700"
    };
    const labelIcon = { WATCH: "eye", TRY: "hand", ADVOCATE: "shield", OWN: "star" };

    // Screen Render
    document.getElementById('display-area').innerHTML = `
        <div class="bg-white rounded-[3rem] shadow-2xl overflow-hidden border-[12px] ${step.zone} flex flex-col lg:flex-row flex-1">
            <div class="w-full lg:w-1/3 bg-slate-50 p-8 border-r-4 border-slate-100 overflow-y-auto flex-shrink-0">
                <div class="flex items-center gap-3 mb-6">
                    <i data-lucide="shopping-basket" class="text-slate-800 w-5 h-5"></i>
                    <h3 class="text-2xl font-black uppercase tracking-tight text-slate-800 italic">The Kit</h3>
                </div>
                <div class="grid grid-cols-2 gap-4 mb-8">
                    ${mod.ingredients.map(ing => `
                        <div class="bg-white p-4 rounded-3xl border-2 border-slate-100 text-center shadow-sm">
                            <span class="text-4xl">${ing.e}</span>
                            <p class="text-[10px] font-black uppercase mt-2 text-slate-500">${ing.n}</p>
                        </div>
                    `).join('')}
                </div>
                <div class="bg-slate-800 rounded-[2.5rem] p-8 text-white">
                    <p class="text-xs font-black uppercase text-teal-400 mb-2 tracking-widest">Chef Lingo</p>
                    <p class="text-xl font-medium leading-tight italic">"${mod.tip}"</p>
                </div>
            </div>

            <div class="flex-1 p-8 lg:p-12 flex flex-col justify-between">
                <div class="flex-1">
                    <div class="flex justify-between items-start mb-6">
                        <div class="px-6 py-2 rounded-full border-4 font-black uppercase italic tracking-widest flex items-center gap-2 ${labelStyle[step.l] || labelStyle.WATCH}">
                            <i data-lucide="${labelIcon[step.l] || 'eye'}" class="w-5 h-5"></i> ${step.l}
                        </div>
                        <span class="text-slate-200 font-black text-6xl lg:text-7xl leading-none">0${currentStep + 1}</span>
                    </div>

                    <div class="bg-white rounded-[2rem] border-4 border-slate-100 p-6 lg:p-8 mb-6 flex justify-center items-center shadow-inner min-h-[180px] overflow-hidden">
                        ${mod.heroVisual}
                    </div>

                    <h2 class="text-3xl lg:text-4xl font-black text-slate-900 uppercase italic tracking-tighter leading-none mb-6">${step.a}</h2>

                    <div class="bg-slate-50 rounded-[2rem] p-6 lg:p-8 flex items-center gap-6 lg:gap-8 border-4 border-slate-100">
                        <div class="bg-white p-4 lg:p-5 rounded-full shadow-md shrink-0">
                            <i data-lucide="${step.i}" class="w-10 h-10 lg:w-12 lg:h-12 text-slate-800"></i>
                        </div>
                        <p class="text-xl lg:text-2xl text-slate-600 font-medium leading-snug">${step.d}</p>
                    </div>
                </div>

                <div class="flex justify-center gap-2 mt-6">
                    ${mod.steps.map((_, i) => `
                        <div class="w-2.5 h-2.5 rounded-full transition-all ${i === currentStep ? 'bg-teal-600 w-6' : 'bg-slate-200'}"></div>
                    `).join('')}
                </div>

                <div class="flex justify-between items-center mt-6 shrink-0">
                    <button onclick="prev()" class="px-8 py-4 lg:px-10 lg:py-5 rounded-3xl font-black bg-slate-100 text-slate-400 uppercase tracking-widest hover:bg-slate-200 transition-all ${currentStep === 0 ? 'opacity-0 pointer-events-none' : ''}">Back</button>
                    ${currentStep === mod.steps.length - 1
                        ? `<div class="bg-yellow-100 text-yellow-800 px-8 py-4 lg:px-10 lg:py-5 rounded-3xl font-black text-xl lg:text-2xl uppercase italic animate-bounce border-4 border-yellow-500 shadow-xl">READY!</div>`
                        : `<button onclick="next()" class="bg-teal-700 text-white px-10 py-4 lg:px-14 lg:py-5 rounded-3xl font-black text-xl lg:text-2xl uppercase italic shadow-2xl flex items-center gap-4 hover:bg-teal-800 transition-all">Next Step <i data-lucide="arrow-right"></i></button>`
                    }
                </div>
            </div>
        </div>
    `;

    // Print Render
    document.getElementById('print-area').innerHTML = `
        <div class="border-b-4 border-slate-200 pb-4 mb-6 flex justify-between items-end print-card">
            <div>
                <p class="text-teal-600 font-black uppercase tracking-widest flex items-center gap-2 mb-1">
                    <i data-lucide="palette" class="w-5 h-5"></i> Plating Station (Dark Green Zone)
                </p>
                <h1 class="text-4xl font-black text-slate-900 uppercase italic tracking-tighter leading-none">${mod.emoji} ${mod.title}</h1>
            </div>
        </div>

        <div class="bg-slate-50 border-4 border-slate-200 rounded-[2rem] p-6 mb-8 flex items-center justify-center print-card shadow-sm h-64 overflow-hidden relative">
            ${mod.heroVisual}
        </div>

        <div class="grid grid-cols-2 gap-4">
            ${mod.steps.map((s, idx) => `
                <div class="border-l-[12px] ${s.zone} bg-white border-y-2 border-r-2 border-slate-100 p-5 rounded-2xl print-card flex flex-col h-full shadow-sm">
                    <div class="flex items-center gap-3 mb-3 border-b-2 border-slate-100 pb-3">
                        <div class="bg-slate-100 p-2 rounded-full"><i data-lucide="${s.i}" class="w-5 h-5 text-slate-600"></i></div>
                        <div>
                            <span class="text-[9px] font-black uppercase tracking-widest text-slate-400 block leading-tight">Step 0${idx+1} • ${s.l}</span>
                            <h3 class="font-black text-slate-800 uppercase leading-none mt-0.5">${s.a}</h3>
                        </div>
                    </div>
                    <p class="text-sm font-medium text-slate-700 leading-snug flex-1">${s.d}</p>
                </div>
            `).join('')}
        </div>
        
        <div class="mt-6 bg-slate-800 text-white rounded-2xl p-6 print-card flex items-center gap-4">
            <i data-lucide="volume-2" class="w-8 h-8 text-teal-400"></i>
            <div>
                <p class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-1">Chef Lingo & Safety Tip</p>
                <p class="font-bold italic">"${mod.tip}"</p>
            </div>
        </div>
    `;

    lucide.createIcons();
}

selectModule(0);
</script>
</body>
</html>
