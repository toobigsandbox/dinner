<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans', sans-serif; }

        /* Zone border colors — exact match to visual_recipes.html */
        .border-anchor   { border-color: #94a3b8; }
        .border-river    { border-color: #3b82f6; }
        .border-safety   { border-color: #ef4444; }
        .border-earth    { border-color: #10b981; }
        .border-plating  { border-color: #064e3b; }
        .border-advocacy { border-color: #a855f7; }
        .border-transition { border-color: #eab308; }

        /* Heat shimmer */
        @keyframes shimmer {
            0%, 100% { opacity: 0.3; transform: scaleX(1) scaleY(1); }
            50%      { opacity: 0.7; transform: scaleX(1.05) scaleY(1.3); }
        }
        .shimmer { animation: shimmer 2s ease-in-out infinite; }
        .shimmer:nth-child(2) { animation-delay: 0.4s; }
        .shimmer:nth-child(3) { animation-delay: 0.8s; }
        .shimmer:nth-child(4) { animation-delay: 1.2s; }

        /* Grill bar heat glow */
        @keyframes glow-bar {
            0%, 100% { opacity: 0.5; }
            50%      { opacity: 1; }
        }
        .glow-bar { animation: glow-bar 1.5s ease-in-out infinite; }

        /* Hand count */
        @keyframes count-pulse {
            0%, 100% { transform: scale(1); }
            50%      { transform: scale(1.08); }
        }
        .count-pulse { animation: count-pulse 1s ease-in-out infinite; }

        /* Step-through fade */
        #display-area { transition: opacity 0.2s ease; }

        /* STRICT US LETTER PRINT OPTIMIZATION */
        .print-only { display: none; }
        
        @media print {
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            body { background: white !important; margin: 0 !important; padding: 0 !important; }
            .no-print, header, footer, #display-area { display: none !important; }
            .print-only { display: block !important; }
            
            @page { size: letter portrait; margin: 0.25in; }
            
            #print-area {
                width: 8in !important;
                margin: 0 auto !important;
                padding: 0.25in !important;
                box-sizing: border-box;
            }

            .print-card { page-break-inside: avoid; }
            
            /* Clean up animations for print */
            .shimmer, .glow-bar, .count-pulse { animation: none !important; opacity: 1 !important; transform: none !important; }
        }
    </style>
</head>

                        <span class="text-[10px] font-black uppercase text-red-500 tracking-widest">30 sec flat side</span>
                    </div>

                    <i data-lucide="arrow-right" class="w-7 h-7 text-slate-300 shrink-0"></i>

                    <!-- Grill marked Strawberry -->
                    <div class="flex flex-col items-center gap-1">
                        <div class="w-16 h-16 rounded-full bg-red-100 border-4 border-red-400 flex items-center justify-center shadow-sm relative overflow-hidden">
                            <div class="w-12 h-12 rounded-full bg-red-200 flex items-center justify-center relative">
                                <span class="text-2xl absolute z-0 opacity-80">🍓</span>
                                <div class="absolute w-10 h-1 bg-slate-800/80 rounded-full rotate-[30deg] top-4 z-10"></div>
                                <div class="absolute w-10 h-1 bg-slate-800/80 rounded-full rotate-[30deg] top-6 z-10"></div>
                                <div class="absolute w-10 h-1 bg-slate-800/80 rounded-full rotate-[30deg] top-8 z-10"></div>
                            </div>
                        </div>
                        <span class="text-[10px] font-black uppercase text-slate-600 tracking-widest">Caramelized!</span>
                    </div>
                </div>

                <div class="flex items-center gap-2 bg-slate-100 border-2 border-slate-200 px-6 py-3 rounded-2xl shadow-sm mt-2">
                    <span class="text-sm font-black text-slate-700 uppercase tracking-widest">In</span>
                    <i data-lucide="arrow-right" class="w-4 h-4 text-slate-400"></i>
                    <span class="text-sm font-black text-red-600 uppercase tracking-widest">Do</span>
                    <i data-lucide="arrow-right" class="w-4 h-4 text-slate-400"></i>
                    <span class="text-sm font-black text-slate-700 uppercase tracking-widest">Out</span>
                </div>
            </div>
        `,
        steps: [
            { l: "WATCH", a: "CHEF GRILLS ONE", d: "Anchor Zone: Chef places one strawberry half flat-side down. Watch the sugars bubble and caramelize quickly. Chef flips it gently.", i: "eye", zone: "border-anchor" },
            { l: "TRY", a: "PLACE ONE BERRY", d: "Safety Zone: Tongs in hand. 45° angle. Flat side down. Hear the sugar sizzle. Step back immediately. Timer: 30 seconds. Don't move it.", i: "flame", zone: "border-safety" },
            { l: "TRY", a: "GENTLE FLIP", d: "Safety Zone: Timer goes off — step in, flip with gentle pressure so you don't squish it, step back. Look at those dark caramelized marks!", i: "repeat", zone: "border-safety" },
            { l: "ADVOCATE", a: "SENSORY WARNING", d: "Safety Zone: The sizzle is loud and the caramelizing sugar might smoke slightly. Use earplugs or step back further if you need to.", i: "shield", zone: "border-advocacy" },
            { l: "OWN", a: "GRILL YOUR OWN", d: "Safety Zone: You do a full round independently. Place → wait 30 seconds → flip → remove. You are the Grill Master.", i: "star", zone: "border-safety" }
        ]
    }
];

// ─── STATE & RENDER ───────────────────────────────────────────────────────────
let currentModule = 0;
let currentStep   = 0;

function selectModule(idx) {
    currentModule = idx;
    currentStep   = 0;
    // Update tab styles
    modules.forEach((_, i) => {
        const tab = document.getElementById('tab-' + i);
        if (!tab) return;
        if (i === idx) {
            tab.className = "px-5 py-2 rounded-2xl font-black uppercase text-sm transition-all bg-white text-slate-900 shadow-xl flex-1 md:flex-none";
        } else {
            tab.className = "px-5 py-2 rounded-2xl font-black uppercase text-sm transition-all text-slate-400 hover:text-white flex-1 md:flex-none";
        }
    });
    render();
}

function next() {
    const steps = modules[currentModule].steps;
    if (currentStep < steps.length - 1) { currentStep++; render(); }
}

function prev() {
    if (currentStep > 0) { currentStep--; render(); }
}

function render() {
    const mod  = modules[currentModule];
    const step = mod.steps[currentStep];

    const labelStyle = {
        WATCH:    "bg-slate-100 border-slate-400 text-slate-600",
        TRY:      "bg-red-50 border-red-500 text-red-600",
        SORT:     "bg-blue-50 border-blue-500 text-blue-600",
        ADVOCATE: "bg-purple-50 border-purple-500 text-purple-600",
        OWN:      "bg-yellow-50 border-yellow-500 text-yellow-700"
    };
    const labelIcon = { WATCH: "eye", TRY: "flame", SORT: "archive", ADVOCATE: "shield", OWN: "star" };

    // 1. RENDER INTERACTIVE SCREEN DISPLAY
    document.getElementById('display-area').innerHTML = `
        <div class="bg-white rounded-[3rem] shadow-2xl overflow-hidden border-[12px] ${step.zone} flex flex-col lg:flex-row flex-1">
            <!-- LEFT: Kit + Tip -->
            <div class="w-full lg:w-1/3 bg-slate-50 p-8 border-r-4 border-slate-100 overflow-y-auto flex-shrink-0">
                <div class="flex items-center gap-3 mb-6">
                    <i data-lucide="shopping-basket" class="text-slate-800 w-5 h-5"></i>
                    <h3 class="text-2xl font-black uppercase tracking-tight text-slate-800 italic">The Kit</h3>
                </div>
                <div class="grid grid-cols-2 gap-4 mb-8">
                    ${mod.ingredients.map(ing => `
                        <div class="bg-white p-4 rounded-3xl border-2 border-slate-100 text-center shadow-sm">
                            <span class="text-4xl">${ing.e}</span>
                            <p class="text-[10px] font-black uppercase mt-2 text-slate-500">${ing.n}</p>
                        </div>
                    `).join('')}
                </div>
                <div class="bg-slate-800 rounded-[2.5rem] p-8 text-white">
                    <p class="text-xs font-black uppercase text-red-400 mb-2 tracking-widest">Chef Lingo</p>
                    <p class="text-xl font-medium leading-tight italic">"${mod.tip}"</p>
                </div>
            </div>

            <!-- RIGHT: Step content -->
            <div class="flex-1 p-8 lg:p-12 flex flex-col justify-between">
                <div class="flex-1">
                    <div class="flex justify-between items-start mb-6">
                        <div class="px-6 py-2 rounded-full border-4 font-black uppercase italic tracking-widest flex items-center gap-2 ${labelStyle[step.l] || labelStyle.WATCH}">
                            <i data-lucide="${labelIcon[step.l] || 'eye'}" class="w-5 h-5"></i> ${step.l}
                        </div>
                        <span class="text-slate-200 font-black text-6xl lg:text-7xl leading-none">0${currentStep + 1}</span>
                    </div>

                    <div class="bg-white rounded-[2rem] border-4 border-slate-100 p-6 lg:p-8 mb-6 flex justify-center items-center shadow-inner min-h-[180px]">
                        ${mod.heroVisual}
                    </div>

                    <h2 class="text-3xl lg:text-4xl font-black text-slate-900 uppercase italic tracking-tighter leading-none mb-6">${step.a}</h2>

                    <div class="bg-slate-50 rounded-[2rem] p-6 lg:p-8 flex items-center gap-6 lg:gap-8 border-4 border-slate-100">
                        <div class="bg-white p-4 lg:p-5 rounded-full shadow-md shrink-0">
                            <i data-lucide="${step.i}" class="w-10 h-10 lg:w-12 lg:h-12 text-slate-800"></i>
                        </div>
                        <p class="text-xl lg:text-2xl text-slate-600 font-medium leading-snug">${step.d}</p>
                    </div>
                </div>

                <div class="flex justify-center gap-2 mt-6">
                    ${mod.steps.map((_, i) => `
                        <div class="w-2.5 h-2.5 rounded-full transition-all ${i === currentStep ? 'bg-red-500 w-6' : 'bg-slate-200'}"></div>
                    `).join('')}
                </div>

                <div class="flex justify-between items-center mt-6 shrink-0">
                    <button onclick="prev()"
                        class="px-8 py-4 lg:px-10 lg:py-5 rounded-3xl font-black bg-slate-100 text-slate-400 uppercase tracking-widest hover:bg-slate-200 transition-all ${currentStep === 0 ? 'opacity-0 pointer-events-none' : ''}">
                        Back
                    </button>
                    ${currentStep === mod.steps.length - 1
                        ? `<div class="bg-yellow-100 text-yellow-800 px-8 py-4 lg:px-10 lg:py-5 rounded-3xl font-black text-xl lg:text-2xl uppercase italic animate-bounce border-4 border-yellow-500 shadow-xl">READY!</div>`
                        : `<button onclick="next()" class="bg-red-600 text-white px-10 py-4 lg:px-14 lg:py-5 rounded-3xl font-black text-xl lg:text-2xl uppercase italic shadow-2xl flex items-center gap-4 hover:bg-red-700 transition-all">
                                Next Step <i data-lucide="arrow-right"></i>
                           </button>`
                    }
                </div>
            </div>
        </div>
    `;

    // 2. RENDER PRINTABLE LAYOUT SUMMARY
    document.getElementById('print-area').innerHTML = `
        <div class="border-b-4 border-slate-200 pb-4 mb-6 flex justify-between items-end print-card">
            <div>
                <p class="text-red-500 font-black uppercase tracking-widest flex items-center gap-2 mb-1">
                    <i data-lucide="flame" class="w-5 h-5"></i> Grill Station Guide
                </p>
                <h1 class="text-4xl font-black text-slate-900 uppercase italic tracking-tighter leading-none">${mod.emoji} ${mod.title}</h1>
            </div>
        </div>

        <div class="bg-slate-50 border-4 border-slate-200 rounded-[2rem] p-6 mb-8 flex items-center justify-center print-card shadow-sm">
            ${mod.heroVisual}
        </div>

        <div class="grid grid-cols-2 gap-4">
            ${mod.steps.map((s, idx) => `
                <div class="border-l-[12px] ${s.zone} bg-white border-y-2 border-r-2 border-slate-100 p-5 rounded-2xl print-card flex flex-col h-full shadow-sm">
                    <div class="flex items-center gap-3 mb-3 border-b-2 border-slate-100 pb-3">
                        <div class="bg-slate-100 p-2 rounded-full"><i data-lucide="${s.i}" class="w-5 h-5 text-slate-600"></i></div>
                        <div>
                            <span class="text-[9px] font-black uppercase tracking-widest text-slate-400 block leading-tight">Step 0${idx+1} • ${s.l}</span>
                            <h3 class="font-black text-slate-800 uppercase leading-none mt-0.5">${s.a}</h3>
                        </div>
                    </div>
                    <p class="text-sm font-medium text-slate-700 leading-snug flex-1">${s.d}</p>
                </div>
            `).join('')}
        </div>
        
        <div class="mt-6 bg-slate-800 text-white rounded-2xl p-6 print-card flex items-center gap-4">
            <i data-lucide="volume-2" class="w-8 h-8 text-red-400"></i>
            <div>
                <p class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-1">Chef Lingo & Safety Tip</p>
                <p class="font-bold italic">"${mod.tip}"</p>
            </div>
        </div>
    `;

    lucide.createIcons();
}

// Boot
selectModule(0); // Starts the render process
</script>
</body>
</html>
