<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Observation Guide - CCC Dinner Series</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans', sans-serif; background-color: #f8fafc; }
        
        /* Landscape Print Optimization */
        @media print {
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            body { background: white !important; margin: 0; padding: 0; }
            .no-print { display: none !important; }
            
            /* Force Landscape and Narrow Margins */
            @page { size: landscape; margin: 0.4in; }
            
            .print-container {
                width: 100%;
                display: block !important;
                padding: 0 !important;
                box-shadow: none !important;
                background: white !important;
            }

            /* Prevent tables from splitting awkwardly */
            .obs-table {
                page-break-inside: avoid;
                margin-bottom: 0.4in;
                width: 100%;
                border-collapse: collapse;
            }

            .obs-table th, .obs-table td {
                border: 2px solid #cbd5e1 !important;
            }

            .obs-table th {
                padding: 0.5rem !important;
            }

            .obs-table td {
                height: 0.75in !important; /* Big writing space */
                padding: 0.25rem !important;
            }
        }

        /* Screen Preview Styles */
        .preview-container { 
            max-width: 11in; /* Landscape width approximation */
            margin: 2rem auto; 
            background: white; 
            padding: 2rem; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            border: 1px solid #e2e8f0;
        }
        
        .obs-table { width: 100%; border-collapse: collapse; margin-bottom: 3rem; }
        .obs-table th, .obs-table td { border: 2px solid #e2e8f0; }
        .obs-table th { padding: 1rem; text-align: left; font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 900; }
        .obs-table td { height: 4.5rem; padding: 0.5rem; } /* Approx 0.75in for screen */
        .col-student { width: 5%; text-align: center !important; font-weight: 900; color: #64748b; background: #f8fafc; }
        .col-notes { width: 40%; } /* Massive notes column */
    </style>
</head>
<body>
    <!-- Screen Controls -->
    <div class="no-print bg-slate-900 text-white p-8 text-center sticky top-0 z-50 shadow-2xl">
        <h1 class="text-4xl font-black uppercase italic tracking-tighter mb-2 text-emerald-400">Observation Guide</h1>
        <p class="text-slate-400 mb-6">Formatted for Landscape Printing. Big writing spaces, color-blocked to the Atrium zones.</p>
        <button onclick="window.print()" class="bg-emerald-600 hover:bg-emerald-500 text-white font-black uppercase tracking-widest px-8 py-4 rounded-2xl flex items-center gap-3 mx-auto transition-all shadow-lg shadow-emerald-500/20">
            <i data-lucide="printer"></i> Print Landscape Clipboard Sheet
        </button>
    </div>

    <div class="preview-container print-container" id="tables-container">
        
        <header class="border-b-4 border-slate-200 pb-4 mb-8 flex justify-between items-end">
            <div>
                <p class="text-emerald-600 font-black uppercase tracking-widest flex items-center gap-2 mb-1">
                    <i data-lucide="clipboard-list" class="w-5 h-5"></i> Staff Tool
                </p>
                <h1 class="text-4xl font-black text-slate-900 uppercase tracking-tighter italic">CCC Dinner Observation Sheet</h1>
            </div>
            <div class="text-right">
                <p class="text-slate-500 font-bold uppercase tracking-widest text-sm">Date: _______________</p>
            </div>
        </header>

        <!-- Tables Injected via JS -->

    </div>

    <script>
        // Table Data Configuration mapped exactly to the prompt
        const sections = [
            { 
                title: "1. WATCH → TRY → OWN (Core Skill Arc)", 
                colorClass: "bg-slate-500 text-white", 
                cols: ["WATCH", "TRY", "OWN", "Notes (big writing space)"] 
            },
            { 
                title: "2. MOVEMENT / FLOW + LINGO", 
                colorClass: "bg-blue-500 text-white", 
                cols: ["Flow", "Lingo", "Notes"] 
            },
            { 
                title: "3. SAFETY (Heat · Sharp · Knife)", 
                colorClass: "bg-red-500 text-white", 
                cols: ["Safety Calls", "Knife Safety", "Heat Awareness", "Notes"] 
            },
            { 
                title: "4. INGREDIENT HANDLING", 
                colorClass: "bg-emerald-800 text-white", 
                cols: ["Sorting", "Washing", "Texture Comfort", "Notes"] 
            },
            { 
                title: "5. SELF-ADVOCACY", 
                colorClass: "bg-purple-500 text-white", 
                cols: ["States Needs", "Uses Method", "\"In the Weeds\"", "Notes"] 
            },
            { 
                title: "6. REGULATION (Sensory + Breaks)", 
                colorClass: "bg-emerald-400 text-slate-900", 
                cols: ["Breaks", "Tools", "Overwhelm Signals", "Returns to Task", "Notes"] 
            },
            { 
                title: "7. TIME + TASK COMPLETION", 
                colorClass: "bg-yellow-400 text-slate-900", 
                cols: ["Responds to Time", "Transitions", "Completes Task", "Notes"] 
            },
            { 
                title: "8. STRENGTHS & NEXT STEPS SNAPSHOT", 
                colorClass: "bg-slate-600 text-white", 
                cols: ["Strengths", "Next Step"] 
            }
        ];

        const container = document.getElementById('tables-container');

        sections.forEach(sec => {
            let tableHTML = `
                <table class="obs-table">
                    <thead>
                        <tr>
                            <th colspan="${sec.cols.length + 1}" class="${sec.colorClass} text-xl italic tracking-tighter">
                                ${sec.title}
                            </th>
                        </tr>
                        <tr class="bg-slate-100 text-slate-700">
                            <th class="col-student">Student</th>
                            ${sec.cols.map(c => `<th class="${c.includes('Notes') || c.includes('Step') ? 'col-notes' : ''}">${c}</th>`).join('')}
                        </tr>
                    </thead>
                    <tbody>
            `;

            // Generate exactly 8 rows for 8 trainees
            for(let i = 1; i <= 8; i++) {
                tableHTML += `<tr><td class="col-student">${i}</td>`;
                for(let j = 0; j < sec.cols.length; j++) {
                    tableHTML += `<td></td>`;
                }
                tableHTML += `</tr>`;
            }

            tableHTML += `</tbody></table>`;
            container.insertAdjacentHTML('beforeend', tableHTML);
        });

        lucide.createIcons();
    </script>
</body>
</html>
