<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flagship Dinner - Visual Agenda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans', sans-serif; }
        .current-item { border-color: #3b82f6; border-left-width: 16px; transform: scale(1.02); }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-4 md:p-8">
    <div class="max-w-6xl mx-auto flex flex-col lg:flex-row gap-8 lg:gap-12">
        
        <div class="flex-1 space-y-6">
            <header class="flex flex-col md:flex-row justify-between items-start md:items-end mb-8 gap-4">
                <div>
                    <p class="text-blue-600 font-black uppercase tracking-widest mb-1 flex items-center gap-2">
                        <i data-lucide="wind" class="w-5 h-5"></i> River Runway Flow
                    </p>
                    <h1 class="text-5xl md:text-6xl font-black text-slate-900 uppercase italic tracking-tighter">Visual Agenda</h1>
                </div>
                <div class="bg-white px-8 py-4 rounded-3xl shadow-xl border-4 border-blue-600 text-center w-full md:w-auto">
                    <p id="live-clock" class="text-4xl font-black text-slate-800 tracking-tight">00:00</p>
                </div>
            </header>

            <div id="agenda-container" class="space-y-4">
                <!-- Items injected via JS -->
            </div>
        </div>

        <div class="w-full lg:w-96 space-y-8">
            <div class="bg-slate-900 rounded-[3rem] p-8 text-white shadow-2xl relative overflow-hidden border-b-8 border-purple-500">
                <h2 class="text-2xl font-black uppercase mb-6 flex items-center gap-2">
                    <i data-lucide="shield" class="text-purple-400"></i> Advocacy Wall
                </h2>
                <div class="space-y-4 relative z-10">
                    <p class="text-sm text-slate-400 italic font-medium leading-relaxed">
                        "If the Atrium environment feels too bright or the water is too cold, use your voice at any time."
                    </p>
                </div>
            </div>

            <div class="bg-blue-600 rounded-[3rem] p-8 text-white text-center shadow-lg">
                <i data-lucide="sparkles" class="mx-auto mb-2 text-blue-200"></i>
                <p class="text-sm font-bold uppercase tracking-widest opacity-80">Value of the Day</p>
                <h4 class="text-3xl font-black uppercase tracking-tight">Confidence</h4>
                <p class="mt-2 text-blue-100 italic">"Preparation removes fear."</p>
            </div>
        </div>
    </div>

    <script>
        const agendaData = [
            { id: 1, time: "5:00-5:15", title: "The Huddle", sub: "Anchor Zone: Name tags & Hello", icon: "users" },
            { id: 2, time: "5:15-5:30", title: "The Walkthrough", sub: "River Runway: Labeled stations", icon: "map" },
            { id: 3, time: "5:30-6:15", title: "Skills Lab", sub: "Earth & Safety Zones: Prep work", icon: "chef-hat" },
            { id: 4, time: "6:15-6:30", title: "The Recharge", sub: "Regulation Zone: Breathing break", icon: "battery-charging" },
            { id: 5, time: "6:30-6:50", title: "Family Meal", sub: "Table Lantern: Social connection", icon: "utensils" },
            { id: 6, time: "6:50-7:00", title: "The Reset", sub: "Transition Station: Passport stickers", icon: "sparkles" }
        ];

        let doneItems = [];

        function updateClock() {
            const now = new Date();
            document.getElementById('live-clock').textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function toggleItem(id) {
            if (doneItems.includes(id)) {
                doneItems = doneItems.filter(i => i !== id);
            } else {
                doneItems.push(id);
            }
            renderAgenda();
        }

        function renderAgenda() {
            const container = document.getElementById('agenda-container');
            container.innerHTML = '';
            agendaData.forEach(item => {
                const isDone = doneItems.includes(item.id);
                const isCurrent = !isDone && (doneItems.length + 1 === item.id || (doneItems.length === 0 && item.id === 1));
                const btn = document.createElement('button');
                btn.onclick = () => toggleItem(item.id);
                btn.className = `w-full text-left flex items-center gap-6 p-6 rounded-[2.5rem] border-4 transition-all duration-500 ${isDone ? 'bg-emerald-500 border-emerald-600 opacity-60' : isCurrent ? 'bg-white current-item shadow-2xl' : 'bg-slate-50 border-slate-200'}`;
                btn.innerHTML = `
                    <div class="flex-1">
                        <p class="${isDone ? 'text-white/80' : 'text-blue-600'} font-black text-sm mb-1">${item.time}</p>
                        <h3 class="text-3xl font-black uppercase tracking-tight ${isDone ? 'text-white' : 'text-slate-800'}">${item.title}</h3>
                        <p class="${isDone ? 'text-white/80' : 'text-slate-500'} font-bold text-xs uppercase italic">${item.sub}</p>
                    </div>
                    <i data-lucide="${isDone ? 'check-circle' : 'circle'}" class="w-10 h-10 ${isDone ? 'text-white' : 'text-slate-200'}"></i>
                `;
                container.appendChild(btn);
            });
            lucide.createIcons();
        }

        setInterval(updateClock, 1000);
        updateClock();
        renderAgenda();
    </script>
</body>
</html>
