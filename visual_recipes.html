<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans', sans-serif; }
        .step-transition { transition: all 0.3s ease-in-out; }
        #module-selector::-webkit-scrollbar { height: 6px; }
        #module-selector::-webkit-scrollbar-track { background: #1e293b; }
        #module-selector::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        
        /* Legend-Based Border Colors */
        .border-anchor { border-color: #94a3b8; } /* Gray */
        .border-river { border-color: #3b82f6; } /* Blue */
        .border-safety { border-color: #ef4444; } /* Red */
        .border-regulation { border-color: #10b981; } /* Light Green */
        .border-plating { border-color: #064e3b; } /* Dark Green */
        .border-advocacy { border-color: #a855f7; } /* Purple */
        .border-transition { border-color: #eab308; } /* Yellow */

            </div>
            
            <div class="flex flex-col gap-4 w-full lg:max-w-4xl">

                            <div class="flex justify-between items-start mb-6">
                                <div class="px-6 py-2 rounded-full border-4 font-black uppercase italic tracking-widest flex items-center gap-2 ${step.l === 'WATCH' ? 'bg-slate-100 border-slate-400 text-slate-600' : step.l === 'TRY' ? 'bg-red-50 border-red-500 text-red-600' : step.l === 'SORT' ? 'bg-blue-50 border-blue-500 text-blue-600' : step.l === 'ADVOCATE' ? 'bg-purple-50 border-purple-500 text-purple-600' : 'bg-yellow-50 border-yellow-500 text-yellow-700'}">
                                    <i data-lucide="${step.l === 'WATCH' ? 'eye' : step.l === 'TRY' ? 'flame' : step.l === 'SORT' ? 'archive' : step.l === 'ADVOCATE' ? 'shield' : 'star'}" class="w-5 h-5"></i> ${step.l}
                                </div>
                                <span class="text-slate-200 font-black text-6xl lg:text-7xl leading-none">0${currentStep + 1}</span>
                            </div>
                            
                            <!-- Hero Visual Section -->
                            ${data.heroVisual ? `
                            <div class="bg-white rounded-[2rem] border-4 border-slate-100 p-6 lg:p-8 mb-6 flex justify-center items-center shadow-inner min-h-[160px]">
                                ${data.heroVisual}
                            </div>
                            <h2 class="text-3xl lg:text-4xl font-black text-slate-900 uppercase italic tracking-tighter leading-none mb-6">${step.a}</h2>
                            ` : `
                            <h2 class="text-5xl lg:text-7xl font-black text-slate-900 uppercase italic tracking-tighter leading-none mb-8">${step.a}</h2>
                            `}

                            <div class="bg-slate-50 rounded-[2rem] p-6 lg:p-8 flex items-center gap-6 lg:gap-8 border-4 border-slate-100">
                                <div class="bg-white p-4 lg:p-6 rounded-full shadow-md shrink-0"><i data-lucide="${step.i}" class="w-10 h-10 lg:w-12 lg:h-12 text-slate-800"></i></div>
                                <p class="text-xl lg:text-2xl text-slate-600 font-medium leading-snug">${step.d}</p>
                            </div>
                        </div>
                        <div class="flex justify-between items-center mt-8 lg:mt-12 shrink-0">
                            <button onclick="prev()" class="px-8 py-4 lg:px-10 lg:py-5 rounded-3xl font-black bg-slate-100 text-slate-400 uppercase tracking-widest hover:bg-slate-200 transition-all ${currentStep === 0 ? 'opacity-0 pointer-events-none' : ''}">Back</button>
                            ${currentStep === data.steps.length - 1 ? 
                                `<div class="bg-yellow-100 text-yellow-800 px-8 py-4 lg:px-10 lg:py-5 rounded-3xl font-black text-xl lg:text-2xl uppercase italic animate-bounce border-4 border-yellow-500 shadow-xl">DELIGHT!</div>` :
                                `<button onclick="next()" class="bg-blue-600 text-white px-10 py-4 lg:px-14 lg:py-5 rounded-3xl font-black text-xl lg:text-2xl uppercase italic shadow-2xl flex items-center gap-4 hover:bg-blue-700 transition-all">Next Step <i data-lucide="arrow-right"></i></button>`
                            }
                        </div>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        render();
    </script>
</body>
</html>
