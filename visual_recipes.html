    <style>
        body { font-family: 'Noto Sans', sans-serif; }
        
        /* Custom Scrollbar for Module Selector */
        #module-selector::-webkit-scrollbar { height: 8px; }
        #module-selector::-webkit-scrollbar-track { background: #1e293b; border-radius: 10px; }
        #module-selector::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        #module-selector::-webkit-scrollbar-thumb:hover { background: #64748b; }

        /* Atrium Zone Legend Borders */
        .border-anchor { border-color: #94a3b8; } /* slate-400 */
        .border-river { border-color: #3b82f6; } /* blue-500 */
        .border-safety { border-color: #ef4444; } /* red-500 */
        .border-regulation { border-color: #10b981; } /* emerald-500 */
        .border-plating { border-color: #0f766e; } /* teal-700 */
        .border-advocacy { border-color: #a855f7; } /* purple-500 */
        .border-transition { border-color: #eab308; } /* yellow-500 */

        /* Grill Animations */
        @keyframes shimmer {
            0%, 100% { opacity: 0.3; transform: scaleX(1) scaleY(1); }
            50%      { opacity: 0.7; transform: scaleX(1.05) scaleY(1.3); }
        }
        .shimmer { animation: shimmer 2s ease-in-out infinite; }
        .shimmer:nth-child(2) { animation-delay: 0.4s; }
        .shimmer:nth-child(3) { animation-delay: 0.8s; }
        .shimmer:nth-child(4) { animation-delay: 1.2s; }

        @keyframes glow-bar {
            0%, 100% { opacity: 0.5; }
            50%      { opacity: 1; }
        }
        .glow-bar { animation: glow-bar 1.5s ease-in-out infinite; }

        @keyframes count-pulse {
            0%, 100% { transform: scale(1); }
            50%      { transform: scale(1.08); }
        }
        .count-pulse { animation: count-pulse 1s ease-in-out infinite; }
    </style>
</head>

                    heroVisual: `<div class="flex items-center justify-center gap-6"><span class="text-7xl">🍚</span><i data-lucide="arrow-right" class="w-8 h-8 text-slate-300"></i><span class="text-7xl">🥣</span></div>`,
                    steps: [
                        { l: "TRY", a: "RINSE RICE", d: "Earth Zone: Put rice in a mesh strainer. Run water until it stays clear.", i: "droplets", zone: "border-regulation" },
                        { l: "WATCH", a: "STOVE ON", d: "Anchor Zone: Chef turns on the heat. Watch for the 'Tiny Bubbles'.", i: "flame", zone: "border-anchor" },
                        { l: "TRY", a: "THE STIR", d: "River Runway: Use a wooden spoon. Draw a giant 'O' in the pot.", i: "timer", zone: "border-river" },
                        { l: "OWN", a: "BERRY TOP", d: "Plating Station: Place the grilled strawberries on top of the creamy pudding.", i: "star", zone: "border-plating" }
                    ]
                }
            ]
        };

        // ─── STATE & CORE LOGIC ──────────────────────────────────────
        let currentCat = 'SKILLS';
        let currentIdx = 0;
        let currentStep = 0;

        function setCategory(cat) {
            currentCat = cat;
            currentIdx = 0;
            currentStep = 0;
            
            const cats = ['SKILLS', 'KNIVES', 'RECIPES'];
            cats.forEach(c => {
                const el = document.getElementById('cat-' + c);
                if (el) {
                    if (c === cat) {
                        if (c === 'SKILLS') el.className = "px-6 py-2 rounded-2xl font-black uppercase text-sm bg-blue-600 text-white shadow-lg transition-all";
                        if (c === 'KNIVES') el.className = "px-6 py-2 rounded-2xl font-black uppercase text-sm bg-orange-600 text-white shadow-lg transition-all";
                        if (c === 'RECIPES') el.className = "px-6 py-2 rounded-2xl font-black uppercase text-sm bg-emerald-700 text-white shadow-lg transition-all";
                    } else {
                        el.className = "px-6 py-2 rounded-2xl font-black uppercase text-sm text-slate-400 hover:text-white transition-all";
                    }
                }
            });
            render();
        }

        function next() {
            if (currentStep < modules[currentCat][currentIdx].steps.length - 1) {
                currentStep++;
                render();
            }
        }

        function prev() {
            if (currentStep > 0) {
                currentStep--;
                render();
            }
        }

        function selectModule(idx) {
            currentIdx = idx;
            currentStep = 0;
            render();
        }

        // ─── RENDERING ENGINE ────────────────────────────────────────
        function render() {
            const catData = modules[currentCat];
            const data = catData[currentIdx];
            const step = data.steps[currentStep];

            // 1. Render Selector Buttons
            const selector = document.getElementById('module-selector');
            selector.innerHTML = catData.map((m, i) => `
                <button onclick="selectModule(${i})" class="px-6 py-3 rounded-2xl font-black whitespace-nowrap transition-all ${currentIdx === i ? 'bg-white text-slate-900 shadow-xl' : 'text-slate-500 hover:text-white'}">
                    ${m.emoji} ${m.title}
                </button>
            `).join('');

            // 2. Map Pedagogy Labels to Colors & Icons
            const getLabelStyles = (label) => {
                switch(label) {
                    case "WATCH": return "bg-slate-100 border-slate-400 text-slate-600";
                    case "TRY": return "bg-blue-50 border-blue-400 text-blue-600";
                    case "SORT": return "bg-emerald-50 border-emerald-400 text-emerald-600";
                    case "ADVOCATE": return "bg-purple-50 border-purple-400 text-purple-600";
                    case "OWN": return "bg-yellow-50 border-yellow-400 text-yellow-700";
                    default: return "bg-slate-100 border-slate-400 text-slate-600";
                }
            };
            
            const getLabelIcon = (label) => {
                switch(label) {
                    case "WATCH": return "eye";
                    case "TRY": return "hand";
                    case "SORT": return "archive";
                    case "ADVOCATE": return "shield";
                    case "OWN": return "star";
                    default: return "eye";
                }
            };

            // 3. Render Main Display
            const display = document.getElementById('display-area');
            display.innerHTML = `
                <div class="bg-white rounded-[3rem] shadow-2xl overflow-hidden border-[12px] ${step.zone} flex flex-col lg:flex-row flex-1 transition-colors duration-500">
                    
                    <!-- LEFT COLUMN: The Kit -->
                    <div class="w-full lg:w-1/3 bg-slate-50 p-8 border-r-4 border-slate-100 overflow-y-auto flex-shrink-0">
                        <div class="flex items-center gap-3 mb-6">
                            <div class="bg-slate-800 p-2 rounded-xl text-white">
                                <i data-lucide="shopping-basket" class="w-5 h-5"></i>
                            </div>
                            <h3 class="text-2xl font-black uppercase tracking-tight text-slate-800 italic">The Kit</h3>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            ${data.ingredients.map(ing => `
                                <div class="bg-white p-4 rounded-3xl border-2 border-slate-100 text-center shadow-sm">
                                    <span class="text-4xl">${ing.e}</span>
                                    <p class="text-[10px] font-black uppercase mt-2 text-slate-500">${ing.n}</p>
                                </div>
                            `).join('')}
                        </div>
                        <div class="mt-8 p-8 bg-slate-800 rounded-[2.5rem] text-white">
                            <p class="text-xs font-black uppercase text-emerald-400 mb-2 tracking-widest">Chef Lingo</p>
                            <p class="text-xl font-medium leading-tight italic">"${data.tip}"</p>
                        </div>
                    </div>

                    <!-- RIGHT COLUMN: The Steps -->
                    <div class="flex-1 p-8 lg:p-12 flex flex-col justify-between">
                        <div class="flex-1">
                            <div class="flex justify-between items-start mb-6">
                                <div class="px-6 py-2 rounded-full border-4 font-black uppercase italic tracking-widest flex items-center gap-2 ${getLabelStyles(step.l)}">
                                    <i data-lucide="${getLabelIcon(step.l)}" class="w-5 h-5"></i> ${step.l}
                                </div>
                                <span class="text-slate-200 font-black text-6xl lg:text-7xl leading-none">0${currentStep + 1}</span>
                            </div>
                            
                            <!-- Hero Visual Section -->
                            ${data.heroVisual ? `
                            <div class="bg-white rounded-[2rem] border-4 border-slate-100 p-6 lg:p-8 mb-6 flex justify-center items-center shadow-inner min-h-[160px]">
                                ${data.heroVisual}
                            </div>
                            <h2 class="text-3xl lg:text-4xl font-black text-slate-900 uppercase italic tracking-tighter leading-none mb-6">${step.a}</h2>
                            ` : `
                            <h2 class="text-5xl lg:text-7xl font-black text-slate-900 uppercase italic tracking-tighter leading-none mb-8">${step.a}</h2>
                            `}

                            <div class="bg-slate-50 rounded-[2rem] p-6 lg:p-8 flex items-center gap-6 lg:gap-8 border-4 border-slate-100">
                                <div class="bg-white p-4 lg:p-6 rounded-full shadow-md shrink-0">
                                    <i data-lucide="${step.i}" class="w-10 h-10 lg:w-12 lg:h-12 text-slate-800"></i>
                                </div>
                                <p class="text-xl lg:text-2xl text-slate-600 font-medium leading-snug">${step.d}</p>
                            </div>
                        </div>

                        <!-- Progress Dots -->
                        <div class="flex justify-center gap-2 mt-6">
                            ${data.steps.map((_, idx) => `
                                <div class="h-3 rounded-full transition-all ${currentStep === idx ? 'bg-slate-800 w-12' : 'bg-slate-200 w-8'}"></div>
                            `).join('')}
                        </div>

                        <!-- Navigation -->
                        <div class="flex justify-between items-center mt-8 lg:mt-10 shrink-0">
                            <button onclick="prev()" class="px-8 py-4 lg:px-10 lg:py-5 rounded-3xl font-black bg-slate-100 text-slate-400 uppercase tracking-widest hover:bg-slate-200 transition-all ${currentStep === 0 ? 'opacity-0 pointer-events-none' : ''}">Back</button>
                            ${currentStep === data.steps.length - 1 ? 
                                `<div class="bg-yellow-100 text-yellow-800 px-8 py-4 lg:px-10 lg:py-5 rounded-3xl font-black text-xl lg:text-2xl uppercase italic animate-bounce border-4 border-yellow-500 shadow-xl">DELIGHT!</div>` :
                                `<button onclick="next()" class="bg-blue-600 text-white px-10 py-4 lg:px-14 lg:py-5 rounded-3xl font-black text-xl lg:text-2xl uppercase italic shadow-2xl flex items-center gap-4 hover:bg-blue-700 transition-all">Next Step <i data-lucide="arrow-right"></i></button>`
                            }
                        </div>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        // Boot Application
        render();
    </script>
</body>
</html>
