<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Recipe Storyboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans', sans-serif; }
        .step-transition { transition: all 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-slate-900 min-h-screen p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col lg:flex-row justify-between items-start lg:items-end mb-12 gap-6">
            <div class="space-y-2">
                <div class="inline-flex items-center gap-2 bg-emerald-600/20 text-emerald-400 px-4 py-1 rounded-full text-xs font-bold uppercase border border-emerald-600/30">
                    <i data-lucide="chef-hat" class="w-4 h-4"></i> Plating Station
                </div>
                <h1 class="text-5xl md:text-6xl font-black text-white uppercase italic tracking-tighter">Visual Recipes</h1>
            </div>
            <div id="recipe-selector" class="flex bg-slate-800 p-2 rounded-3xl border border-slate-700 overflow-x-auto w-full lg:max-w-3xl">
                <!-- Recipe buttons injected here -->
            </div>
        </header>

        <main id="recipe-display" class="min-h-[600px] lg:h-[750px]">
            <!-- Active recipe content injected here -->
        </main>

        <footer class="mt-12 grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-slate-800/50 p-6 rounded-3xl border-t-8 border-slate-400 flex items-center gap-4 text-white">
                <i data-lucide="eye" class="text-slate-400"></i>
                <div><p class="font-bold uppercase text-sm">WATCH (Anchor)</p><p class="text-slate-400 text-xs">Eyes on Chef first.</p></div>
            </div>
            <div class="bg-slate-800/50 p-6 rounded-3xl border-t-8 border-blue-500 flex items-center gap-4 text-white">
                <i data-lucide="hand" class="text-blue-400"></i>
                <div><p class="font-bold uppercase text-sm">TRY (River)</p><p class="text-slate-400 text-xs">Practice together.</p></div>
            </div>
            <div class="bg-slate-800/50 p-6 rounded-3xl border-t-8 border-emerald-800 flex items-center gap-4 text-white">
                <i data-lucide="star" class="text-emerald-500"></i>
                <div><p class="font-bold uppercase text-sm">OWN (Plating)</p><p class="text-slate-400 text-xs">This is your task!</p></div>
            </div>
        </footer>
    </div>

    <script>
        const recipes = [
            {
                title: "Cucumber Rounds", emoji: "🥒", tip: "Fingers tucked like a cat claw!",
                ingredients: [{n: "Cucumber", e: "🥒"}, {n: "Salt", e: "🧂"}, {n: "Yogurt", e: "🥣"}, {n: "Onion", e: "🧅"}, {n: "Dill", e: "🌿"}],
                steps: [
                    { l: "WATCH", a: "0.5 INCH SLICE", d: "Anchor Zone: Watch Chef show the thickness.", i: "eye" },
                    { l: "TRY", a: "SALT & SIT", d: "River Runway: Lay flat on paper towels. Salt lightly.", i: "hand" },
                    { l: "OWN", a: "SPOON & TOP", d: "Plating Station: Dot yogurt. Add onion fronds.", i: "star" }
                ]
            },
            {
                title: "Beet Skewers", emoji: "🍢", tip: "Beet-Apple-Beet pattern!",
                ingredients: [{n: "Beets", e: "🏮"}, {n: "Apples", e: "🍎"}, {n: "Lemon", e: "🍋"}, {n: "Honey", e: "🍯"}, {n: "Cumin", e: "🧂"}],
                steps: [
                    { l: "WATCH", a: "FOIL ROAST", d: "Anchor Zone: Watch Chef prep the foil wrap.", i: "eye" },
                    { l: "TRY", a: "TOWEL PEEL", d: "River Runway: Rub skin off with a paper towel.", i: "hand" },
                    { l: "OWN", a: "PATTERN POKE", d: "Plating Station: Build your Beet-Apple skewers.", i: "star" }
                ]
            }
        ];

        let currentRecipeIdx = 0;
        let currentStepIdx = 0;

        function selectRecipe(idx) {
            currentRecipeIdx = idx;
            currentStepIdx = 0;
            render();
        }

        function nextStep() {
            if (currentStepIdx < recipes[currentRecipeIdx].steps.length - 1) {
                currentStepIdx++;
                render();
            }
        }

        function prevStep() {
            if (currentStepIdx > 0) {
                currentStepIdx--;
                render();
            }
        }

        function render() {
            const recipe = recipes[currentRecipeIdx];
            const step = recipe.steps[currentStepIdx];
            const selector = document.getElementById('recipe-selector');
            selector.innerHTML = recipes.map((r, i) => `
                <button onclick="selectRecipe(${i})" class="px-6 py-3 rounded-2xl font-black whitespace-nowrap transition-all ${currentRecipeIdx === i ? 'bg-white text-slate-900 shadow-xl scale-105' : 'text-slate-500 hover:text-white'}">
                    ${r.emoji} ${r.title}
                </button>
            `).join('');

            const levelColorMap = {
                'WATCH': 'bg-slate-50 border-slate-300 text-slate-600',
                'TRY': 'bg-blue-50 border-blue-300 text-blue-700',
                'OWN': 'bg-emerald-50 border-emerald-800 text-emerald-900'
            };

            const display = document.getElementById('recipe-display');
            display.innerHTML = `
                <div class="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border-4 border-slate-100 flex flex-col md:flex-row h-full">
                    <div class="w-full md:w-1/3 bg-slate-50 p-6 lg:p-8 border-r-4 border-slate-100">
                        <div class="flex items-center gap-3 mb-6">
                            <i data-lucide="shopping-basket" class="text-emerald-800"></i>
                            <h3 class="text-2xl font-black uppercase tracking-tight text-slate-800">The Kit</h3>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            ${recipe.ingredients.map(ing => `<div class="bg-white p-3 rounded-2xl border-2 border-slate-100 text-center"><span class="text-3xl">${ing.e}</span><p class="text-[10px] font-bold uppercase mt-1 text-slate-600">${ing.n}</p></div>`).join('')}
                        </div>
                        <div class="mt-8 p-6 bg-emerald-800 rounded-3xl text-white">
                            <p class="text-xs font-bold uppercase opacity-70 mb-1 tracking-widest italic">Chef Tip</p>
                            <p class="text-lg font-medium leading-tight italic">"${recipe.tip}"</p>
                        </div>
                    </div>
                    <div class="flex-1 p-6 lg:p-10 flex flex-col justify-between">
                        <div>
                            <div class="flex justify-between items-center mb-6">
                                <div class="px-4 py-1 rounded-full border-2 font-bold uppercase flex items-center gap-2 ${levelColorMap[step.l]}">
                                    <i data-lucide="${step.l === 'WATCH' ? 'eye' : step.l === 'TRY' ? 'hand' : 'star'}" class="w-4 h-4"></i> ${step.l}
                                0${currentStepIdx+1}</span>
                            </div>
                            <h4 class="text-4xl lg:text-5xl font-black text-slate-800 mb-6 leading-tight uppercase italic tracking-tighter">${step.a}</h4>
                            <div class="bg-slate-50 rounded-[2.5rem] p-8 flex items-center gap-8 border-2 border-slate-100">
                                <div class="bg-white p-6 rounded-full shadow-md"><i data-lucide="${step.i}" class="text-emerald-800 w-12 h-12 lg:w-16 lg:h-16"></i></div>
                                <p class="text-2xl lg:text-3xl text-slate-600 font-medium leading-snug">${step.d}</p>
                            </div>
                        </div>
                        <div class="flex justify-between items-center pt-8">
                            <button onclick="prevStep()" class="px-8 py-4 rounded-2xl font-bold bg-slate-100 text-slate-400 ${currentStepIdx === 0 ? 'opacity-0 pointer-events-none' : ''}">Back</button>
                            ${currentStepIdx === recipe.steps.length - 1 ? 
                                `<div class="text-emerald-800 font-black text-3xl flex items-center gap-3 animate-pulse uppercase italic">READY!</div>` : 
                                `<button onclick="nextStep()" class="px-12 py-5 rounded-2xl font-bold bg-blue-600 text-white shadow-xl flex items-center gap-3 text-xl transition-all hover:bg-blue-700">
                                    Next Step <i data-lucide="arrow-right"></i>
                                </button>`
                            }
                        </div>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        render();
    </script>
</body>
</html>
